<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Growth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;--surface:#0a0e18;--border:#162232;--border2:#203144;
  --accent:#8fd0f0;--accent2:#4d8aa8;
  --text:#dceef7;--text2:#6b8494;--text3:#243240;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:18px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(143,208,240,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(143,208,240,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(143,208,240,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">Crystal <em>//</em> Growth (DLA)</div>
  <div class="stats">
    <div class="stat"><span class="stat-label">結晶セル</span><span class="stat-val" id="statN">0</span></div>
    <div class="stat"><span class="stat-label">浮遊粒子</span><span class="stat-val" id="statWalk">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="reset()">リセット</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">対称性（雪の結晶モード）</div>
      <div class="preset-grid">
        <button id="sym-1" class="on" onclick="setSym(1)">なし</button>
        <button id="sym-4" onclick="setSym(4)">4回</button>
        <button id="sym-6" onclick="setSym(6)">6回</button>
        <button id="sym-8" onclick="setSym(8)">8回</button>
        <button id="sym-5" onclick="setSym(5)">5回</button>
        <button id="sym-3" onclick="setSym(3)">3回</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:6px;line-height:1.7;">6回対称で雪の結晶のような形に。付着位置を回転コピーします</div>
    </div>

    <div class="sec">
      <div class="sec-title">成長パラメータ</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">浮遊粒子数</span><span class="sl-val" id="vWalkers">600</span></div>
        <input type="range" min="50" max="2500" value="600" step="50" id="sWalkers" oninput="vWalkers.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">付着のしやすさ</span><span class="sl-val" id="vStick">1.0</span></div>
        <input type="range" min="0.05" max="1" value="1.0" step="0.05" id="sStick" oninput="vStick.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">異方性（枝の鋭さ）</span><span class="sl-val" id="vAniso">0.5</span></div>
        <input type="range" min="0" max="1" value="0.5" step="0.05" id="sAniso" oninput="vAniso.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">1フレーム計算量</span><span class="sl-val" id="vSteps">12</span></div>
        <input type="range" min="1" max="40" value="12" step="1" id="sSteps" oninput="vSteps.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">セルサイズ</span><span class="sl-val" id="vCS">3</span></div>
        <input type="range" min="2" max="6" value="3" step="1" id="sCS" oninput="vCS.textContent=this.value;reset()">
      </div>
      <div class="tog-row"><span class="tog-label">浮遊粒子を表示</span>
        <label class="tog"><input type="checkbox" id="togWalkers" checked><div class="tog-track"></div></label>
      </div>
      <div class="tog-row"><span class="tog-label">年代で色付け</span>
        <label class="tog"><input type="checkbox" id="togAge" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      ランダムに漂う粒子が結晶に触れると付着<br>
      （拡散律速凝集 / DLA）。<br>
      対称性をかけると雪の結晶や霜の<br>
      ような樹枝状結晶が育ちます
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">Space: pause / 対称性を変えて結晶の形を探る</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');

let W=0,H=0,CS=3,GW=0,GH=0;
let grid; // Uint8Array: 0 empty, 1 crystal
let ageGrid; // Uint16Array: tick when settled
let walkers=[]; // {x,y}
let running=true, tick=0;
let fpsFrames=0,fpsLast=performance.now();
let symmetry=1;
let crystalCount=0;
let cx=0, cy=0; // center

function setSym(s){
  symmetry=s;
  [1,3,4,5,6,8].forEach(k=>{const el=document.getElementById('sym-'+k);if(el)el.classList.toggle('on',k===s);});
  reset();
}

function reset(){
  CS=+document.getElementById('sCS').value;
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/CS); GH=Math.floor(H/CS);
  grid=new Uint8Array(GW*GH);
  ageGrid=new Uint16Array(GW*GH);
  walkers=[];
  tick=0; crystalCount=0;
  cx=Math.floor(GW/2); cy=Math.floor(GH/2);
  // Seed center
  settle(cx,cy);
  ctx.fillStyle='#05080f'; ctx.fillRect(0,0,W,H);
  updateStats();
}

function settle(gx,gy){
  if(gx<0||gx>=GW||gy<0||gy>=GH) return;
  const i=gy*GW+gx;
  if(grid[i]) return;
  grid[i]=1; ageGrid[i]=tick; crystalCount++;

  // Apply symmetry: rotate point around center and settle copies
  if(symmetry>1){
    const dx=gx-cx, dy=gy-cy;
    for(let k=1;k<symmetry;k++){
      const ang=k*Math.PI*2/symmetry;
      const ca=Math.cos(ang), sa=Math.sin(ang);
      const rx=Math.round(cx+dx*ca-dy*sa);
      const ry=Math.round(cy+dx*sa+dy*ca);
      if(rx>=0&&rx<GW&&ry>=0&&ry<GH){
        const ri=ry*GW+rx;
        if(!grid[ri]){grid[ri]=1;ageGrid[ri]=tick;crystalCount++;}
      }
    }
    // Also mirror for snowflake-like reflection symmetry
    if(symmetry===6||symmetry===4||symmetry===8){
      for(let k=0;k<symmetry;k++){
        const ang=k*Math.PI*2/symmetry;
        const ca=Math.cos(ang), sa=Math.sin(ang);
        const mx=Math.round(cx+(dx*ca-(-dy)*sa));
        const my=Math.round(cy+(dx*sa+(-dy)*ca));
        if(mx>=0&&mx<GW&&my>=0&&my<GH){
          const mi=my*GW+mx;
          if(!grid[mi]){grid[mi]=1;ageGrid[mi]=tick;crystalCount++;}
        }
      }
    }
  }
}

function spawnWalker(){
  // Spawn on a circle around the crystal's current radius
  const maxR=Math.min(GW,GH)/2-2;
  const a=Math.random()*Math.PI*2;
  return {x:cx+Math.cos(a)*maxR, y:cy+Math.sin(a)*maxR};
}

function neighborCrystal(gx,gy){
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    if(!dx&&!dy) continue;
    const nx=gx+dx, ny=gy+dy;
    if(nx<0||nx>=GW||ny<0||ny>=GH) continue;
    if(grid[ny*GW+nx]) return true;
  }
  return false;
}

function step(){
  const target=+document.getElementById('sWalkers').value;
  const stickP=+document.getElementById('sStick').value;
  const aniso=+document.getElementById('sAniso').value;
  const substeps=+document.getElementById('sSteps').value;

  while(walkers.length<target) walkers.push(spawnWalker());

  const maxR=Math.min(GW,GH)/2-1;

  for(let s=0;s<substeps;s++){
    tick++;
    for(let i=walkers.length-1;i>=0;i--){
      const wlk=walkers[i];
      // Random walk with slight inward bias
      wlk.x+=(Math.random()*2-1)*1.4;
      wlk.y+=(Math.random()*2-1)*1.4;
      // gentle pull toward center so they don't wander off
      const dx=cx-wlk.x, dy=cy-wlk.y;
      const d=Math.hypot(dx,dy)||1;
      wlk.x+=dx/d*0.25; wlk.y+=dy/d*0.25;

      // Out of bounds → respawn
      if(d>maxR+4){ walkers[i]=spawnWalker(); continue; }

      const gx=Math.round(wlk.x), gy=Math.round(wlk.y);
      if(gx<0||gx>=GW||gy<0||gy>=GH) continue;

      if(neighborCrystal(gx,gy)){
        // Anisotropy: more likely to stick if aligned to a preferred axis
        let p=stickP;
        if(aniso>0){
          const ang=Math.atan2(gy-cy,gx-cx);
          const axisN=symmetry>1?symmetry:6;
          const aligned=Math.abs(Math.cos(ang*axisN));
          p=stickP*(1-aniso + aniso*aligned);
        }
        if(Math.random()<p){
          settle(gx,gy);
          walkers[i]=spawnWalker();
        }
      }
    }
  }
  updateStats();
}

function updateStats(){
  document.getElementById('statN').textContent=crystalCount.toLocaleString();
  document.getElementById('statWalk').textContent=walkers.length.toLocaleString();
}

function hslToRgb(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return [(r+m)*255|0,(g+m)*255|0,(b+m)*255|0];
}

function render(){
  ctx.fillStyle='#05080f'; ctx.fillRect(0,0,W,H);
  const ageColor=document.getElementById('togAge').checked;

  for(let gy=0;gy<GH;gy++) for(let gx=0;gx<GW;gx++){
    const idx=gy*GW+gx;
    if(!grid[idx]) continue;
    let r,g,b;
    if(ageColor){
      const t=tick>0?ageGrid[idx]/tick:0;
      // hue from cyan(old core) to white-blue(new tips)
      const hue=190+t*40;
      [r,g,b]=hslToRgb(hue, 55, 45+t*35);
    } else { r=200;g=230;b=245; }
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(gx*CS,gy*CS,CS,CS);
  }

  if(document.getElementById('togWalkers').checked){
    ctx.fillStyle='rgba(120,170,200,0.4)';
    for(const w of walkers) ctx.fillRect(w.x*CS,w.y*CS,1,1);
  }
}

function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){
    document.getElementById('statFps').textContent=fpsFrames;
    fpsFrames=0; fpsLast=now;
  }
  if(running) step();
  render();
}

function togglePlay(){
  running=!running;
  const btn=document.getElementById('btnPlay');
  btn.textContent=running?'■ pause':'▶ resume';
  btn.classList.toggle('running',running);
}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());

reset();
loop();
</script>
</body>
</html>
