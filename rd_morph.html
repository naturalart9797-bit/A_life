<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Morph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08060d;--surface:#0e0b16;--border:#1d1828;--border2:#2a2440;
  --accent:#b06af7;--accent2:#7a3fcc;
  --text:#e0d4f0;--text2:#7c6a90;--text3:#2e2640;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:16px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#e05252;display:none;animation:blink 1s infinite;}
.rec-dot.on{display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(176,106,247,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(176,106,247,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(176,106,247,.1);}
.rec-btn{border-color:#e05252;color:#e05252;}
.rec-btn:hover,.rec-btn.recording{background:rgba(224,82,82,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}
.img-slots{display:flex;gap:6px;}
.img-slot{flex:1;aspect-ratio:1;border:1px dashed var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-slot:hover{border-color:var(--accent2);}
.img-slot img{width:100%;height:100%;object-fit:cover;}
.img-slot .ph{font-family:var(--font-mono);font-size:9px;color:var(--text3);text-align:center;line-height:1.5;}
.img-slot .badge{position:absolute;top:3px;left:4px;font-family:var(--font-mono);font-size:9px;color:var(--accent);background:rgba(8,6,13,.7);padding:1px 5px;border-radius:3px;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.morph-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);}
.morph-fill{height:100%;background:var(--accent);width:0%;}
.cmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">RD <em>//</em> Morph</div>
  <span class="rec-dot" id="recDot"></span>
  <div class="stats">
    <div class="stat"><span class="stat-label">補間</span><span class="stat-val" id="statMorph">A</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="restart()">最初から</button>
        <button class="rec-btn" id="btnRec" onclick="toggleRec()">● rec</button>
        <button id="btnDL" onclick="downloadVid()" disabled>↓</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">画像（2枚）</div>
      <div class="img-slots">
        <div class="img-slot" id="slotA" onclick="document.getElementById('fileA').click()">
          <div class="ph">画像A<br>クリック</div>
        </div>
        <div class="img-slot" id="slotB" onclick="document.getElementById('fileB').click()">
          <div class="ph">画像B<br>クリック</div>
        </div>
      </div>
      <input type="file" id="fileA" accept="image/*" style="display:none" onchange="loadImg(this,'A')">
      <input type="file" id="fileB" accept="image/*" style="display:none" onchange="loadImg(this,'B')">
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:6px;line-height:1.6;">2枚の明暗パターンの間を反応拡散で補間します</div>
    </div>

    <div class="sec">
      <div class="sec-title">補間（A↔B ループ）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">遷移の速さ</span><span class="sl-val" id="vMorphSpd">0.004</span></div>
        <input type="range" min="0.0005" max="0.02" value="0.004" step="0.0005" id="sMorphSpd" oninput="vMorphSpd.textContent=(+this.value).toFixed(4)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">端での停留</span><span class="sl-val" id="vHold">120</span></div>
        <input type="range" min="0" max="400" value="120" step="10" id="sHold" oninput="vHold.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">遷移中の溶解</span><span class="sl-val" id="vDissolve">0.5</span></div>
        <input type="range" min="0" max="1" value="0.5" step="0.05" id="sDissolve" oninput="vDissolve.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="tog-row"><span class="tog-label">イージング</span>
        <label class="tog"><input type="checkbox" id="togEase" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">反応拡散</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">Feed f</span><span class="sl-val" id="vF">0.046</span></div>
        <input type="range" min="0.01" max="0.1" value="0.046" step="0.001" id="sF" oninput="vF.textContent=(+this.value).toFixed(3)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">Kill k</span><span class="sl-val" id="vK">0.063</span></div>
        <input type="range" min="0.03" max="0.08" value="0.063" step="0.001" id="sK" oninput="vK.textContent=(+this.value).toFixed(3)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">画像が種をまく力</span><span class="sl-val" id="vSeed">0.18</span></div>
        <input type="range" min="0" max="0.5" value="0.18" step="0.01" id="sSeed" oninput="vSeed.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">1フレーム反復</span><span class="sl-val" id="vIter">8</span></div>
        <input type="range" min="1" max="20" value="8" step="1" id="sIter" oninput="vIter.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="cmap-grid">
        <button class="on" id="cm-img" onclick="setCmap('img')">画像の色</button>
        <button id="cm-fire" onclick="setCmap('fire')">ファイア</button>
        <button id="cm-plasma" onclick="setCmap('plasma')">プラズマ</button>
        <button id="cm-bw" onclick="setCmap('bw')">白黒</button>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      画像Aのパターンが反応拡散で崩れ、<br>
      画像Bのパターンへ再形成されながら<br>
      往復します。生命が形を変える様子に
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">2枚の画像をアップロードしてください</div>
    <div class="morph-bar"><div class="morph-fill" id="morphFill"></div></div>
  </div>
</div>

<canvas id="sampleCanvas" style="display:none;"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');
const sampleCanvas=document.getElementById('sampleCanvas');
const sctx=sampleCanvas.getContext('2d',{willReadFrequently:true});

let W=0,H=0,GW=0,GH=0;
const SCALE=2;
let U,V,U2,V2;
let lumA=null,lumB=null,colA=null,colB=null;
let imgA=null,imgB=null;
let morph=0,morphDir=1,holdTimer=0;
let running=true,tick=0;
let cmap='img';
let imgData,buf;
let fpsFrames=0,fpsLast=performance.now();

const CMAPS={
  fire:(t)=>{t=Math.min(1,t);return[Math.min(255,t*400)|0,Math.max(0,(t-0.3)*350)|0,Math.max(0,(t-0.7)*500)|0];},
  plasma:(t)=>interp([[13,8,135],[126,3,168],[204,71,120],[248,148,65],[240,249,33]],t),
  bw:(t)=>{const v=Math.min(1,t)*255|0;return[v,v,v];}
};
function interp(stops,t){t=Math.min(0.999,Math.max(0,t));const f=t*(stops.length-1),i=Math.floor(f),fr=f-i;const a=stops[i],b=stops[Math.min(stops.length-1,i+1)];return[a[0]+(b[0]-a[0])*fr|0,a[1]+(b[1]-a[1])*fr|0,a[2]+(b[2]-a[2])*fr|0];}
function setCmap(c){cmap=c;['img','fire','plasma','bw'].forEach(k=>document.getElementById('cm-'+k).classList.toggle('on',k===c));}

function loadImg(input,slot){
  const f=input.files[0];if(!f)return;
  const img=new Image();
  img.onload=()=>{
    if(slot==='A'){imgA=img;showThumb('slotA',img,'A');}
    else{imgB=img;showThumb('slotB',img,'B');}
    buildFields();
  };
  img.src=URL.createObjectURL(f);
}
function showThumb(id,img,label){const slot=document.getElementById(id);slot.innerHTML='<div class="badge">'+label+'</div>';const im=document.createElement('img');im.src=img.src;slot.appendChild(im);}

function sampleImg(img){
  if(!img||GW===0)return{lum:null,col:null};
  const lum=new Float32Array(GW*GH);
  const col=new Uint8Array(GW*GH*3);
  sampleCanvas.width=GW;sampleCanvas.height=GH;
  sctx.fillStyle='#000';sctx.fillRect(0,0,GW,GH);
  const scale=Math.min(GW/img.width,GH/img.height);
  const dw=img.width*scale,dh=img.height*scale;
  sctx.drawImage(img,(GW-dw)/2,(GH-dh)/2,dw,dh);
  const data=sctx.getImageData(0,0,GW,GH).data;
  for(let i=0,p=0;i<GW*GH;i++,p+=4){
    lum[i]=(data[p]*0.299+data[p+1]*0.587+data[p+2]*0.114)/255;
    col[i*3]=data[p];col[i*3+1]=data[p+1];col[i*3+2]=data[p+2];
  }
  return{lum,col};
}
function buildFields(){
  const a=sampleImg(imgA), b=sampleImg(imgB);
  lumA=a.lum;colA=a.col;lumB=b.lum;colB=b.col;
  if(imgA&&imgB) document.querySelector('.hint').style.display='none';
}

function reset(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/SCALE);GH=Math.floor(H/SCALE);
  const n=GW*GH;
  U=new Float32Array(n).fill(1);
  V=new Float32Array(n);
  U2=new Float32Array(n);V2=new Float32Array(n);
  imgData=ctx.createImageData(W,H);buf=imgData.data;
  buildFields();
  restart();
}
function restart(){
  morph=0;morphDir=1;holdTimer=0;tick=0;
  U.fill(1);V.fill(0);
  // Seed from A
  if(lumA){ for(let i=0;i<GW*GH;i++) if(lumA[i]>0.5&&Math.random()<lumA[i]*0.5) V[i]=0.5; }
}

function curLum(){
  // interpolated target brightness field
  let m=morph; if(document.getElementById('togEase').checked) m=m*m*(3-2*m);
  return m;
}

function stepRD(){
  tick++;
  const ease=document.getElementById('togEase').checked;
  const morphSpd=+document.getElementById('sMorphSpd').value;
  const hold=+document.getElementById('sHold').value;
  const dissolve=+document.getElementById('sDissolve').value;
  const f0=+document.getElementById('sF').value;
  const k0=+document.getElementById('sK').value;
  const seedAmt=+document.getElementById('sSeed').value;
  const iters=+document.getElementById('sIter').value;

  // advance morph
  if(holdTimer>0) holdTimer--;
  else{
    morph+=morphDir*morphSpd;
    if(morph>=1){morph=1;morphDir=-1;holdTimer=hold;}
    else if(morph<=0){morph=0;morphDir=1;holdTimer=hold;}
  }
  let m=morph; if(ease) m=m*m*(3-2*m);

  // dissolve factor: peaks mid-transition → reaction gets more chaotic
  const trans=Math.sin(m*Math.PI); // 0 ends, 1 mid
  const fMod=trans*dissolve*0.02;

  const Du=0.20,Dv=0.10;
  const lerpLum=(lumA&&lumB)?true:false;

  for(let it=0;it<iters;it++){
    for(let y=0;y<GH;y++){
      for(let x=0;x<GW;x++){
        const i=y*GW+x;
        const xm=(x-1+GW)%GW,xp=(x+1)%GW,ym=(y-1+GH)%GH,yp=(y+1)%GH;
        const lapU=U[y*GW+xm]+U[y*GW+xp]+U[ym*GW+x]+U[yp*GW+x]-4*U[i];
        const lapV=V[y*GW+xm]+V[y*GW+xp]+V[ym*GW+x]+V[yp*GW+x]-4*V[i];
        // target brightness at this cell for current morph
        let tb=0.5;
        if(lerpLum) tb=lumA[i]*(1-m)+lumB[i]*m;
        // f,k shift by target brightness + transition chaos
        const f=f0+(tb-0.5)*0.012+fMod;
        const k=k0-(tb-0.5)*0.008;
        const u=U[i],v=V[i],uvv=u*v*v;
        U2[i]=Math.max(0,Math.min(1,u+(Du*lapU-uvv+f*(1-u))));
        V2[i]=Math.max(0,Math.min(1,v+(Dv*lapV+uvv-(f+k)*v)));
      }
    }
    const tu=U;U=U2;U2=tu;const tv=V;V=V2;V2=tv;
  }

  // Continuous seeding toward target image's bright areas
  if(lerpLum && seedAmt>0){
    for(let i=0;i<GW*GH;i++){
      const tb=lumA[i]*(1-m)+lumB[i]*m;
      if(tb>0.55 && Math.random()<seedAmt*0.02*tb) V[i]=Math.min(1,V[i]+0.3);
      if(tb<0.25 && Math.random()<seedAmt*0.015) V[i]*=0.85; // erode dark areas
    }
  }

  document.getElementById('morphFill').style.width=(m*100)+'%';
  document.getElementById('statMorph').textContent=morphDir>0?'A→B':'B→A';
}

function render(){
  const m = document.getElementById('togEase').checked ? morph*morph*(3-2*morph) : morph;
  const useImg=cmap==='img'&&colA&&colB;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const i=y*GW+x;
    const v=Math.min(1,V[i]*2);
    let r,g,b;
    if(useImg && v>0.04){
      const cr=colA[i*3]*(1-m)+colB[i*3]*m;
      const cg=colA[i*3+1]*(1-m)+colB[i*3+1]*m;
      const cb=colA[i*3+2]*(1-m)+colB[i*3+2]*m;
      const br=Math.min(1.3,v*1.5);
      r=Math.min(255,cr*br);g=Math.min(255,cg*br);b=Math.min(255,cb*br);
    } else {
      [r,g,b]=(CMAPS[cmap]||CMAPS.fire)(v);
    }
    for(let dy=0;dy<SCALE;dy++)for(let dx=0;dx<SCALE;dx++){
      const px=((y*SCALE+dy)*W+(x*SCALE+dx))*4;
      buf[px]=r;buf[px+1]=g;buf[px+2]=b;buf[px+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
}

function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){document.getElementById('statFps').textContent=fpsFrames;fpsFrames=0;fpsLast=now;}
  if(running)stepRD();
  render();
}

function togglePlay(){running=!running;const btn=document.getElementById('btnPlay');btn.textContent=running?'■ pause':'▶ resume';btn.classList.toggle('running',running);}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());

wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{
  e.preventDefault();
  const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
  if(files[0]){const dt=new DataTransfer();dt.items.add(files[0]);document.getElementById('fileA').files=dt.files;loadImg(document.getElementById('fileA'),'A');}
  if(files[1]){const dt=new DataTransfer();dt.items.add(files[1]);document.getElementById('fileB').files=dt.files;loadImg(document.getElementById('fileB'),'B');}
});

// Recording
let mediaRecorder=null,recChunks=[];
function toggleRec(){if(!mediaRecorder||mediaRecorder.state==='inactive')startRec();else stopRec();}
function startRec(){recChunks=[];const stream=canvas.captureStream(30);const opts={mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:9000000};if(!MediaRecorder.isTypeSupported(opts.mimeType))opts.mimeType='video/webm';try{mediaRecorder=new MediaRecorder(stream,opts);}catch(e){mediaRecorder=new MediaRecorder(stream);}mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};mediaRecorder.onstop=()=>{document.getElementById('btnDL').disabled=false;document.getElementById('recDot').classList.remove('on');document.getElementById('btnRec').textContent='● rec';document.getElementById('btnRec').classList.remove('recording');};mediaRecorder.start(100);document.getElementById('recDot').classList.add('on');document.getElementById('btnRec').textContent='■ stop';document.getElementById('btnRec').classList.add('recording');}
function stopRec(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();}
function downloadVid(){if(!recChunks.length)return;const blob=new Blob(recChunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rd_morph_'+Date.now()+'.webm';a.click();}

reset();
loop();
</script>
</body>
</html>
