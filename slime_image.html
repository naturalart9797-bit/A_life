<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime on Image</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0805;--surface:#13100a;--border:#2a2416;--border2:#3a3220;
  --accent:#e0c850;--accent2:#a89020;
  --text:#f0eccc;--text2:#8a805a;--text3:#3a3220;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:16px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#e05252;display:none;animation:blink 1s infinite;}
.rec-dot.on{display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(224,200,80,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(224,200,80,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(224,200,80,.1);}
.rec-btn{border-color:#e05252;color:#e05252;}
.rec-btn:hover,.rec-btn.recording{background:rgba(224,82,82,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;}
.img-slot{aspect-ratio:16/10;border:1px dashed var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-slot:hover{border-color:var(--accent2);}
.img-slot img{width:100%;height:100%;object-fit:contain;}
.img-slot .ph{font-family:var(--font-mono);font-size:10px;color:var(--text3);text-align:center;line-height:1.6;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.cmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">Slime <em>//</em> on Image</div>
  <span class="rec-dot" id="recDot"></span>
  <div class="stats">
    <div class="stat"><span class="stat-label">エージェント</span><span class="stat-val" id="statN">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="reset()">リセット</button>
        <button class="rec-btn" id="btnRec" onclick="toggleRec()">● rec</button>
        <button id="btnDL" onclick="downloadVid()" disabled>↓</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">画像（餌場）</div>
      <div class="img-slot" id="slot" onclick="document.getElementById('file').click()">
        <div class="ph">画像をクリック<br>明るい部分を粘菌がなぞります</div>
      </div>
      <input type="file" id="file" accept="image/*" style="display:none" onchange="loadImg(this)">
      <div class="sl-row" style="margin-top:8px;">
        <div class="sl-head"><span class="sl-name">画像への誘引</span><span class="sl-val" id="vImgPull">2.5</span></div>
        <input type="range" min="0" max="8" value="2.5" step="0.1" id="sImgPull" oninput="vImgPull.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="tog-row"><span class="tog-label">輪郭(エッジ)を強調</span>
        <label class="tog"><input type="checkbox" id="togEdge"><div class="tog-track"></div></label>
      </div>
      <div class="tog-row"><span class="tog-label">背景に画像をうっすら表示</span>
        <label class="tog"><input type="checkbox" id="togShowImg"><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">エージェント</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">個体数</span><span class="sl-val" id="vN">120000</span></div>
        <input type="range" min="5000" max="400000" value="120000" step="5000" id="sN" oninput="vN.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">移動速度</span><span class="sl-val" id="vSpeed">1.0</span></div>
        <input type="range" min="0.3" max="3" value="1.0" step="0.1" id="sSpeed" oninput="vSpeed.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">センサー角°</span><span class="sl-val" id="vSA">28</span></div>
        <input type="range" min="5" max="80" value="28" step="1" id="sSA" oninput="vSA.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">センサー距離</span><span class="sl-val" id="vSD">12</span></div>
        <input type="range" min="3" max="40" value="12" step="1" id="sSD" oninput="vSD.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">旋回角°</span><span class="sl-val" id="vTA">38</span></div>
        <input type="range" min="5" max="90" value="38" step="1" id="sTA" oninput="vTA.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">化学物質</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">拡散</span><span class="sl-val" id="vDiff">0.5</span></div>
        <input type="range" min="0" max="1" value="0.5" step="0.05" id="sDiff" oninput="vDiff.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">蒸発率</span><span class="sl-val" id="vDecay">0.08</span></div>
        <input type="range" min="0.01" max="0.3" value="0.08" step="0.01" id="sDecay" oninput="vDecay.textContent=(+this.value).toFixed(2)">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="cmap-grid">
        <button class="on" id="cm-gold" onclick="setCmap('gold')">ゴールド</button>
        <button id="cm-plasma" onclick="setCmap('plasma')">プラズマ</button>
        <button id="cm-viridis" onclick="setCmap('viridis')">ビリジス</button>
        <button id="cm-ice" onclick="setCmap('ice')">アイス</button>
      </div>
      <div class="tog-row" style="margin-top:8px;"><span class="tog-label">画像の色を反映</span>
        <label class="tog"><input type="checkbox" id="togImgColor"><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      数十万のエージェントが画像の明るい部分に<br>
      引き寄せられ、化学物質をたどり合って<br>
      画像の形を血管のようになぞります
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">画像をアップロードしてください / Space: pause</div>
  </div>
</div>

<canvas id="sampleCanvas" style="display:none;"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');
const sampleCanvas=document.getElementById('sampleCanvas');
const sctx=sampleCanvas.getContext('2d',{willReadFrequently:true});

let W=0,H=0,GW=0,GH=0;
const SCALE=2;
let trail, trail2;
let imgField=null;   // Float32Array brightness 0..1 at grid res
let imgColor=null;   // Uint8Array rgb at grid res (3 per cell)
let agents=null;     // Float32Array x,y,angle
let nAgents=0;
let running=true;
let fpsFrames=0,fpsLast=performance.now();
let cmap='gold';
let imgData,buf;
let srcImg=null;

const CMAPS={
  gold:(t)=>{t=Math.min(1,t);return [t*255|0,(t*t*205)|0,(t*t*t*70)|0];},
  plasma:(t)=>interp([[13,8,135],[126,3,168],[204,71,120],[248,148,65],[240,249,33]],t),
  viridis:(t)=>interp([[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]],t),
  ice:(t)=>interp([[5,10,30],[20,60,120],[80,160,220],[170,220,250],[240,250,255]],t),
};
function interp(stops,t){t=Math.min(0.999,Math.max(0,t));const f=t*(stops.length-1),i=Math.floor(f),fr=f-i;const a=stops[i],b=stops[Math.min(stops.length-1,i+1)];return [a[0]+(b[0]-a[0])*fr|0,a[1]+(b[1]-a[1])*fr|0,a[2]+(b[2]-a[2])*fr|0];}
function setCmap(c){cmap=c;['gold','plasma','viridis','ice'].forEach(k=>document.getElementById('cm-'+k).classList.toggle('on',k===c));}

function loadImg(input){
  const f=input.files[0]; if(!f) return;
  const img=new Image();
  img.onload=()=>{
    srcImg=img;
    const slot=document.getElementById('slot');
    slot.innerHTML=''; const im=document.createElement('img'); im.src=img.src; slot.appendChild(im);
    buildImageField();
    document.querySelector('.hint').style.display='none';
  };
  img.src=URL.createObjectURL(f);
}

function buildImageField(){
  if(!srcImg||GW===0) return;
  imgField=new Float32Array(GW*GH);
  imgColor=new Uint8Array(GW*GH*3);
  // Draw image contained in grid
  sampleCanvas.width=GW; sampleCanvas.height=GH;
  sctx.fillStyle='#000'; sctx.fillRect(0,0,GW,GH);
  const scale=Math.min(GW/srcImg.width, GH/srcImg.height);
  const dw=srcImg.width*scale, dh=srcImg.height*scale;
  sctx.drawImage(srcImg,(GW-dw)/2,(GH-dh)/2,dw,dh);
  const data=sctx.getImageData(0,0,GW,GH).data;
  const edge=document.getElementById('togEdge').checked;
  // brightness
  const lum=new Float32Array(GW*GH);
  for(let i=0,p=0;i<GW*GH;i++,p+=4){
    lum[i]=(data[p]*0.299+data[p+1]*0.587+data[p+2]*0.114)/255;
    imgColor[i*3]=data[p];imgColor[i*3+1]=data[p+1];imgColor[i*3+2]=data[p+2];
  }
  if(edge){
    // Sobel-ish edge magnitude
    for(let y=1;y<GH-1;y++)for(let x=1;x<GW-1;x++){
      const i=y*GW+x;
      const gx=lum[i-1]-lum[i+1];
      const gy=lum[i-GW]-lum[i+GW];
      imgField[i]=Math.min(1,Math.hypot(gx,gy)*3);
    }
  } else {
    imgField.set(lum);
  }
}

function reset(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/SCALE); GH=Math.floor(H/SCALE);
  trail=new Float32Array(GW*GH);
  trail2=new Float32Array(GW*GH);
  imgData=ctx.createImageData(W,H);
  buf=imgData.data;

  nAgents=+document.getElementById('sN').value;
  agents=new Float32Array(nAgents*3);
  for(let i=0;i<nAgents;i++){
    agents[i*3]=Math.random()*GW;
    agents[i*3+1]=Math.random()*GH;
    agents[i*3+2]=Math.random()*Math.PI*2;
  }
  document.getElementById('statN').textContent=nAgents.toLocaleString();
  if(srcImg) buildImageField();
}

function senseAt(x,y,a,SD){
  const sx=x+Math.cos(a)*SD, sy=y+Math.sin(a)*SD;
  const ix=Math.floor(sx), iy=Math.floor(sy);
  if(ix<0||ix>=GW||iy<0||iy>=GH) return -1;
  const i=iy*GW+ix;
  let v=trail[i];
  if(imgField){
    const pull=+document.getElementById('sImgPull').value;
    v+=imgField[i]*pull*30;
  }
  return v;
}

function simStep(){
  const speed=+document.getElementById('sSpeed').value;
  const SA=+document.getElementById('sSA').value*Math.PI/180;
  const SD=+document.getElementById('sSD').value;
  const TA=+document.getElementById('sTA').value*Math.PI/180;

  for(let i=0;i<nAgents;i++){
    let x=agents[i*3], y=agents[i*3+1], a=agents[i*3+2];
    const cF=senseAt(x,y,a,SD);
    const cL=senseAt(x,y,a-SA,SD);
    const cR=senseAt(x,y,a+SA,SD);
    if(cF>cL&&cF>cR){}
    else if(cF<cL&&cF<cR){a+=(Math.random()<0.5?-1:1)*TA;}
    else if(cL<cR){a+=TA;}
    else if(cR<cL){a-=TA;}
    x+=Math.cos(a)*speed; y+=Math.sin(a)*speed;
    if(x<0)x+=GW;else if(x>=GW)x-=GW;
    if(y<0)y+=GH;else if(y>=GH)y-=GH;
    const ix=Math.floor(x),iy=Math.floor(y);
    if(ix>=0&&ix<GW&&iy>=0&&iy<GH) trail[iy*GW+ix]+=14;
    agents[i*3]=x;agents[i*3+1]=y;agents[i*3+2]=a;
  }
}

function diffuseDecay(){
  const diff=+document.getElementById('sDiff').value;
  const decay=+document.getElementById('sDecay').value;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const i=y*GW+x;
    let sum=trail[i],cnt=1;
    if(x>0){sum+=trail[i-1];cnt++;}
    if(x<GW-1){sum+=trail[i+1];cnt++;}
    if(y>0){sum+=trail[i-GW];cnt++;}
    if(y<GH-1){sum+=trail[i+GW];cnt++;}
    const v=trail[i]*(1-diff)+(sum/cnt)*diff;
    trail2[i]=v*(1-decay);
  }
  const t=trail;trail=trail2;trail2=t;
}

function render(){
  const showImg=document.getElementById('togShowImg').checked;
  const useImgColor=document.getElementById('togImgColor').checked;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const i=y*GW+x;
    const v=trail[i];
    const t=Math.min(1,v/40);
    let r,g,b;
    if(useImgColor&&imgColor&&t>0.02){
      const br=Math.min(1,t*1.4);
      r=imgColor[i*3]*br; g=imgColor[i*3+1]*br; b=imgColor[i*3+2]*br;
    } else {
      [r,g,b]=CMAPS[cmap](t);
    }
    if(showImg&&imgField){
      const bg=imgField[i]*40;
      r=Math.max(r,bg*0.6);g=Math.max(g,bg*0.6);b=Math.max(b,bg*0.7);
    }
    for(let dy=0;dy<SCALE;dy++)for(let dx=0;dx<SCALE;dx++){
      const px=((y*SCALE+dy)*W+(x*SCALE+dx))*4;
      buf[px]=r;buf[px+1]=g;buf[px+2]=b;buf[px+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
}

function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){document.getElementById('statFps').textContent=fpsFrames;fpsFrames=0;fpsLast=now;}
  if(running){simStep();diffuseDecay();}
  render();
}

function togglePlay(){
  running=!running;
  const btn=document.getElementById('btnPlay');
  btn.textContent=running?'■ pause':'▶ resume';
  btn.classList.toggle('running',running);
}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());
document.getElementById('togEdge').addEventListener('change',buildImageField);

wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{
  e.preventDefault();
  const f=[...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));
  if(f){const dt=new DataTransfer();dt.items.add(f);document.getElementById('file').files=dt.files;loadImg(document.getElementById('file'));}
});

// Recording
let mediaRecorder=null,recChunks=[];
function toggleRec(){if(!mediaRecorder||mediaRecorder.state==='inactive')startRec();else stopRec();}
function startRec(){
  recChunks=[];
  const stream=canvas.captureStream(30);
  const opts={mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:10000000};
  if(!MediaRecorder.isTypeSupported(opts.mimeType))opts.mimeType='video/webm';
  try{mediaRecorder=new MediaRecorder(stream,opts);}catch(e){mediaRecorder=new MediaRecorder(stream);}
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  mediaRecorder.onstop=()=>{document.getElementById('btnDL').disabled=false;document.getElementById('recDot').classList.remove('on');document.getElementById('btnRec').textContent='● rec';document.getElementById('btnRec').classList.remove('recording');};
  mediaRecorder.start(100);
  document.getElementById('recDot').classList.add('on');document.getElementById('btnRec').textContent='■ stop';document.getElementById('btnRec').classList.add('recording');
}
function stopRec(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();}
function downloadVid(){if(!recChunks.length)return;const blob=new Blob(recChunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='slime_image_'+Date.now()+'.webm';a.click();}

reset();
loop();
</script>
</body>
</html>
