<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Diffusion on Image</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08060d;--surface:#0e0b16;--border:#1d1828;--border2:#2a2440;
  --accent:#b06af7;--accent2:#7a3fcc;
  --text:#e0d4f0;--text2:#7c6a90;--text3:#2e2640;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:16px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#e05252;display:none;animation:blink 1s infinite;}
.rec-dot.on{display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(176,106,247,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(176,106,247,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(176,106,247,.1);}
.rec-btn{border-color:#e05252;color:#e05252;}
.rec-btn:hover,.rec-btn.recording{background:rgba(224,82,82,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}
.img-slot{aspect-ratio:16/10;border:1px dashed var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-slot:hover{border-color:var(--accent2);}
.img-slot img{width:100%;height:100%;object-fit:contain;}
.img-slot .ph{font-family:var(--font-mono);font-size:10px;color:var(--text3);text-align:center;line-height:1.6;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">Reaction-Diffusion <em>//</em> on Image</div>
  <span class="rec-dot" id="recDot"></span>
  <div class="stats">
    <div class="stat"><span class="stat-label">世代</span><span class="stat-val" id="statGen">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="seedFromImage()">画像から種まき</button>
        <button style="flex:1" onclick="clearV()">クリア</button>
      </div>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button class="rec-btn" id="btnRec" onclick="toggleRec()" style="flex:1;">● rec</button>
        <button id="btnDL" onclick="downloadVid()" disabled>↓</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">画像</div>
      <div class="img-slot" id="slot" onclick="document.getElementById('file').click()">
        <div class="ph">画像をクリック<br>明暗がパターンの地形になります</div>
      </div>
      <input type="file" id="file" accept="image/*" style="display:none" onchange="loadImg(this)">
      <div class="tog-row" style="margin-top:8px;"><span class="tog-label">画像でf,kを変調</span>
        <label class="tog"><input type="checkbox" id="togModulate" checked><div class="tog-track"></div></label>
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">変調の強さ</span><span class="sl-val" id="vMod">0.012</span></div>
        <input type="range" min="0" max="0.03" value="0.012" step="0.001" id="sMod" oninput="vMod.textContent=(+this.value).toFixed(3)">
      </div>
      <div class="tog-row"><span class="tog-label">画像の色を反映</span>
        <label class="tog"><input type="checkbox" id="togImgColor" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Gray-Scott プリセット</div>
      <div class="preset-grid">
        <button class="on" id="p-coral" onclick="setPreset('coral')">サンゴ</button>
        <button id="p-spots" onclick="setPreset('spots')">斑点</button>
        <button id="p-maze" onclick="setPreset('maze')">迷路</button>
        <button id="p-worms" onclick="setPreset('worms')">虫</button>
        <button id="p-waves" onclick="setPreset('waves')">波</button>
        <button id="p-cells" onclick="setPreset('cells')">細胞</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">パラメータ</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">Feed f</span><span class="sl-val" id="vF">0.058</span></div>
        <input type="range" min="0.01" max="0.1" value="0.058" step="0.001" id="sF" oninput="vF.textContent=(+this.value).toFixed(3)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">Kill k</span><span class="sl-val" id="vK">0.063</span></div>
        <input type="range" min="0.03" max="0.08" value="0.063" step="0.001" id="sK" oninput="vK.textContent=(+this.value).toFixed(3)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">拡散 Du</span><span class="sl-val" id="vDu">0.20</span></div>
        <input type="range" min="0.05" max="0.4" value="0.20" step="0.01" id="sDu" oninput="vDu.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">拡散 Dv</span><span class="sl-val" id="vDv">0.10</span></div>
        <input type="range" min="0.02" max="0.2" value="0.10" step="0.01" id="sDv" oninput="vDv.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">1フレーム反復</span><span class="sl-val" id="vIter">10</span></div>
        <input type="range" min="1" max="25" value="10" step="1" id="sIter" oninput="vIter.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">カラーマップ</div>
      <div class="cmap-grid">
        <button class="on" id="cm-fire" onclick="setCmap('fire')">ファイア</button>
        <button id="cm-plasma" onclick="setCmap('plasma')">プラズマ</button>
        <button id="cm-viridis" onclick="setCmap('viridis')">ビリジス</button>
        <button id="cm-bw" onclick="setCmap('bw')">白黒</button>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      クリック/ドラッグで反応物を注入<br>
      画像の明暗で反応速度が変わり、<br>
      絵の形に沿って模様が育ちます
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c" style="cursor:crosshair;"></canvas>
    <div class="hint">画像をアップロード→「画像から種まき」 / クリックで注入</div>
  </div>
</div>

<canvas id="sampleCanvas" style="display:none;"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');
const sampleCanvas=document.getElementById('sampleCanvas');
const sctx=sampleCanvas.getContext('2d',{willReadFrequently:true});

let W=0,H=0,GW=0,GH=0;
const SCALE=2;
let U,V,U2,V2;
let imgLum=null, imgColor=null;
let srcImg=null;
let running=true, gen=0;
let fpsFrames=0,fpsLast=performance.now();
let cmap='fire';
let imgData,buf;
let painting=false;

const PRESETS={
  coral:{f:0.058,k:0.063}, spots:{f:0.035,k:0.065}, maze:{f:0.029,k:0.057},
  worms:{f:0.046,k:0.063}, waves:{f:0.014,k:0.045}, cells:{f:0.026,k:0.051}
};
const CMAPS={
  fire:(t)=>{t=Math.min(1,t);return [Math.min(255,t*400)|0,Math.max(0,(t-0.3)*350)|0,Math.max(0,(t-0.7)*500)|0];},
  plasma:(t)=>interp([[13,8,135],[126,3,168],[204,71,120],[248,148,65],[240,249,33]],t),
  viridis:(t)=>interp([[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]],t),
  bw:(t)=>{const v=Math.min(1,t)*255|0;return[v,v,v];}
};
function interp(stops,t){t=Math.min(0.999,Math.max(0,t));const f=t*(stops.length-1),i=Math.floor(f),fr=f-i;const a=stops[i],b=stops[Math.min(stops.length-1,i+1)];return[a[0]+(b[0]-a[0])*fr|0,a[1]+(b[1]-a[1])*fr|0,a[2]+(b[2]-a[2])*fr|0];}
function setCmap(c){cmap=c;['fire','plasma','viridis','bw'].forEach(k=>document.getElementById('cm-'+k).classList.toggle('on',k===c));}
function setPreset(p){const pr=PRESETS[p];Object.keys(PRESETS).forEach(k=>document.getElementById('p-'+k).classList.toggle('on',k===p));document.getElementById('sF').value=pr.f;document.getElementById('vF').textContent=pr.f.toFixed(3);document.getElementById('sK').value=pr.k;document.getElementById('vK').textContent=pr.k.toFixed(3);}

function loadImg(input){
  const f=input.files[0];if(!f)return;
  const img=new Image();
  img.onload=()=>{
    srcImg=img;
    const slot=document.getElementById('slot');slot.innerHTML='';const im=document.createElement('img');im.src=img.src;slot.appendChild(im);
    buildImageField();
    seedFromImage();
    document.querySelector('.hint').style.display='none';
  };
  img.src=URL.createObjectURL(f);
}

function buildImageField(){
  if(!srcImg||GW===0)return;
  imgLum=new Float32Array(GW*GH);
  imgColor=new Uint8Array(GW*GH*3);
  sampleCanvas.width=GW;sampleCanvas.height=GH;
  sctx.fillStyle='#000';sctx.fillRect(0,0,GW,GH);
  const scale=Math.min(GW/srcImg.width,GH/srcImg.height);
  const dw=srcImg.width*scale,dh=srcImg.height*scale;
  sctx.drawImage(srcImg,(GW-dw)/2,(GH-dh)/2,dw,dh);
  const data=sctx.getImageData(0,0,GW,GH).data;
  for(let i=0,p=0;i<GW*GH;i++,p+=4){
    imgLum[i]=(data[p]*0.299+data[p+1]*0.587+data[p+2]*0.114)/255;
    imgColor[i*3]=data[p];imgColor[i*3+1]=data[p+1];imgColor[i*3+2]=data[p+2];
  }
}

function reset(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/SCALE);GH=Math.floor(H/SCALE);
  const n=GW*GH;
  U=new Float32Array(n).fill(1);
  V=new Float32Array(n);
  U2=new Float32Array(n);V2=new Float32Array(n);
  imgData=ctx.createImageData(W,H);buf=imgData.data;
  gen=0;
  if(srcImg){buildImageField();seedFromImage();}
  else { // seed center
    seedBlob(GW>>1,GH>>1,8);
  }
}

function seedBlob(cx,cy,r){
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r)continue;
    const x=cx+dx,y=cy+dy;
    if(x<0||x>=GW||y<0||y>=GH)continue;
    V[y*GW+x]=0.5+Math.random()*0.25;
  }
}

function seedFromImage(){
  if(!imgLum){seedBlob(GW>>1,GH>>1,8);return;}
  U.fill(1);V.fill(0);
  // Seed V where image is bright
  for(let i=0;i<GW*GH;i++){
    if(imgLum[i]>0.5 && Math.random()<imgLum[i]*0.5){
      V[i]=0.5+Math.random()*0.2;
    }
  }
  gen=0;
}

function clearV(){U.fill(1);V.fill(0);gen=0;}

function stepRD(){
  const f0=+document.getElementById('sF').value;
  const k0=+document.getElementById('sK').value;
  const Du=+document.getElementById('sDu').value;
  const Dv=+document.getElementById('sDv').value;
  const iters=+document.getElementById('sIter').value;
  const modulate=document.getElementById('togModulate').checked&&imgLum;
  const modAmt=+document.getElementById('sMod').value;

  for(let it=0;it<iters;it++){
    for(let y=0;y<GH;y++){
      for(let x=0;x<GW;x++){
        const i=y*GW+x;
        const xm=(x-1+GW)%GW, xp=(x+1)%GW, ym=(y-1+GH)%GH, yp=(y+1)%GH;
        const lapU=U[y*GW+xm]+U[y*GW+xp]+U[ym*GW+x]+U[yp*GW+x]-4*U[i];
        const lapV=V[y*GW+xm]+V[y*GW+xp]+V[ym*GW+x]+V[yp*GW+x]-4*V[i];
        let f=f0,k=k0;
        if(modulate){
          // image brightness shifts f and k locally
          const b=imgLum[i]-0.5;
          f=f0+b*modAmt; k=k0-b*modAmt*0.6;
        }
        const u=U[i],v=V[i],uvv=u*v*v;
        U2[i]=Math.max(0,Math.min(1,u+(Du*lapU-uvv+f*(1-u))));
        V2[i]=Math.max(0,Math.min(1,v+(Dv*lapV+uvv-(f+k)*v)));
      }
    }
    const tu=U;U=U2;U2=tu;const tv=V;V=V2;V2=tv;
  }
  gen++;
  document.getElementById('statGen').textContent=gen.toLocaleString();
}

function render(){
  const useImgColor=document.getElementById('togImgColor').checked&&imgColor;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const i=y*GW+x;
    const v=Math.min(1,V[i]*2);
    let r,g,b;
    if(useImgColor && v>0.05){
      const br=Math.min(1.3,v*1.6);
      r=Math.min(255,imgColor[i*3]*br);
      g=Math.min(255,imgColor[i*3+1]*br);
      b=Math.min(255,imgColor[i*3+2]*br);
    } else {
      [r,g,b]=CMAPS[cmap](v);
    }
    for(let dy=0;dy<SCALE;dy++)for(let dx=0;dx<SCALE;dx++){
      const px=((y*SCALE+dy)*W+(x*SCALE+dx))*4;
      buf[px]=r;buf[px+1]=g;buf[px+2]=b;buf[px+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
}

function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){document.getElementById('statFps').textContent=fpsFrames;fpsFrames=0;fpsLast=now;}
  if(running)stepRD();
  render();
}

function togglePlay(){running=!running;const btn=document.getElementById('btnPlay');btn.textContent=running?'■ pause':'▶ resume';btn.classList.toggle('running',running);}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());

function injectAt(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const gx=Math.floor((clientX-rect.left)/SCALE), gy=Math.floor((clientY-rect.top)/SCALE);
  const r=4;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r)continue;
    const x=gx+dx,y=gy+dy;
    if(x<0||x>=GW||y<0||y>=GH)continue;
    V[y*GW+x]=0.6;
  }
}
canvas.addEventListener('mousedown',e=>{painting=true;injectAt(e.clientX,e.clientY);});
canvas.addEventListener('mousemove',e=>{if(painting)injectAt(e.clientX,e.clientY);});
document.addEventListener('mouseup',()=>painting=false);

wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{e.preventDefault();const f=[...e.dataTransfer.files].find(f=>f.type.startsWith('image/'));if(f){const dt=new DataTransfer();dt.items.add(f);document.getElementById('file').files=dt.files;loadImg(document.getElementById('file'));}});

// Recording
let mediaRecorder=null,recChunks=[];
function toggleRec(){if(!mediaRecorder||mediaRecorder.state==='inactive')startRec();else stopRec();}
function startRec(){recChunks=[];const stream=canvas.captureStream(30);const opts={mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:9000000};if(!MediaRecorder.isTypeSupported(opts.mimeType))opts.mimeType='video/webm';try{mediaRecorder=new MediaRecorder(stream,opts);}catch(e){mediaRecorder=new MediaRecorder(stream);}mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};mediaRecorder.onstop=()=>{document.getElementById('btnDL').disabled=false;document.getElementById('recDot').classList.remove('on');document.getElementById('btnRec').textContent='● rec';document.getElementById('btnRec').classList.remove('recording');};mediaRecorder.start(100);document.getElementById('recDot').classList.add('on');document.getElementById('btnRec').textContent='■ stop';document.getElementById('btnRec').classList.add('recording');}
function stopRec(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();}
function downloadVid(){if(!recChunks.length)return;const blob=new Blob(recChunks,{type:'video/webm'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rd_image_'+Date.now()+'.webm';a.click();}

reset();
loop();
</script>
</body>
</html>
