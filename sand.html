<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0a07;--surface:#15110b;--border:#2c2418;--border2:#3c3322;
  --accent:#e8a838;--accent2:#a87520;
  --text:#f2e8d5;--text2:#8c7d5e;--text3:#3c3322;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:18px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(232,168,56,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(232,168,56,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(232,168,56,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.avalanche-meter{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
.avalanche-fill{height:100%;width:0%;background:linear-gradient(to right,#e8a838,#e0522e);transition:width .1s;}
</style>
</head>
<body>
<header>
  <div class="logo">Sand <em>//</em> self-organization</div>
  <div class="stats">
    <div class="stat"><span class="stat-label">砂粒</span><span class="stat-val" id="statGrains">0</span></div>
    <div class="stat"><span class="stat-label">雪崩規模</span><span class="stat-val" id="statAval">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="clearAll()">クリア</button>
        <button style="flex:1" onclick="fillFloor()">床を作る</button>
      </div>
      <div class="avalanche-meter"><div class="avalanche-fill" id="avalFill"></div></div>
    </div>

    <div class="sec">
      <div class="sec-title">モード</div>
      <div class="mode-grid">
        <button class="on" id="mode-fall" onclick="setMode('fall')">落砂・崩落</button>
        <button id="mode-pile" onclick="setMode('pile')">サンドパイル</button>
        <button id="mode-wind" onclick="setMode('wind')">風・砂紋</button>
        <button id="mode-water" onclick="setMode('water')">水と砂</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:7px;line-height:1.7;" id="modeDesc"></div>
    </div>

    <div class="sec">
      <div class="sec-title">物理</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">安息角（崩れやすさ）</span><span class="sl-val" id="vAngle">2</span></div>
        <input type="range" min="1" max="6" value="2" step="1" id="sAngle" oninput="vAngle.textContent=this.value">
      </div>
      <div class="sl-row" id="rowWind" style="display:none;">
        <div class="sl-head"><span class="sl-name">風の強さ</span><span class="sl-val" id="vWind">2</span></div>
        <input type="range" min="0" max="6" value="2" step="1" id="sWind" oninput="vWind.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">ブラシサイズ</span><span class="sl-val" id="vBrush">4</span></div>
        <input type="range" min="1" max="14" value="4" step="1" id="sBrush" oninput="vBrush.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">シミュ速度</span><span class="sl-val" id="vIter">2</span></div>
        <input type="range" min="1" max="6" value="2" step="1" id="sIter" oninput="vIter.textContent=this.value">
      </div>
    </div>

    <div class="sec" id="secPile" style="display:none;">
      <div class="sec-title">サンドパイル（自己組織化臨界）</div>
      <div class="tog-row"><span class="tog-label">中央に砂を降らせ続ける</span>
        <label class="tog"><input type="checkbox" id="togRain" checked><div class="tog-track"></div></label>
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">臨界高さ</span><span class="sl-val" id="vCrit">4</span></div>
        <input type="range" min="2" max="8" value="4" step="1" id="sCrit" oninput="vCrit.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">材料パレット</div>
      <div class="mode-grid">
        <button class="on" id="mat-sand" onclick="setMat('sand')">砂</button>
        <button id="mat-wall" onclick="setMat('wall')">岩（固定）</button>
        <button id="mat-water" onclick="setMat('water')">水</button>
        <button id="mat-erase" onclick="setMat('erase')">消しゴム</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">粒のサイズ</span><span class="sl-val" id="vCS">3</span></div>
        <input type="range" min="2" max="8" value="3" step="1" id="sCS" oninput="vCS.textContent=this.value;rebuild()">
      </div>
      <div class="tog-row"><span class="tog-label">高さで色分け</span>
        <label class="tog"><input type="checkbox" id="togHeight" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      クリック/ドラッグ: 材料を配置<br>
      落砂モードで砂山を作ると安息角を超えた<br>
      斜面が雪崩のように崩れます
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">クリックで砂を配置 / Space: pause</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');

const EMPTY=0, SAND=1, WALL=2, WATER=3;

let CS=3, COLS=0, ROWS=0, N=0;
let grid;
let pileH=null;
let running=true;
let mode='fall', material='sand';
let painting=false, paintX=0, paintY=0;
let fpsFrames=0,fpsLast=performance.now();
let imgData,buf;
let avalancheSize=0, avalancheDisplay=0;
let grainCount=0;

const MODE_DESC={
  fall:'砂が重力で落下し、安息角を超えた斜面は崩れる。砂山を積むと雪崩が起きる。',
  pile:'Bak-Tang-Wiesenfeldのサンドパイル模型。1粒ずつ足すと突然大規模な雪崩が起きる自己組織化臨界。',
  wind:'風が砂を運び、風下に砂紋・砂丘ができる。風上が削れ風下に堆積する。',
  water:'水と砂が相互作用。水は隙間を流れ、砂は水中を沈降する。',
};

function rebuild(){
  CS=+document.getElementById('sCS').value;
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  COLS=Math.floor(canvas.width/CS);
  ROWS=Math.floor(canvas.height/CS);
  N=COLS*ROWS;
  grid=new Uint8Array(N);
  pileH=new Uint16Array(N);
  imgData=ctx.createImageData(canvas.width,canvas.height);
  buf=imgData.data;
  grainCount=0;
  render();
}
function idx(r,c){return r*COLS+c;}

function clearAll(){grid.fill(0);if(pileH)pileH.fill(0);grainCount=0;render();}
function fillFloor(){
  for(let c=0;c<COLS;c++) for(let r=ROWS-3;r<ROWS;r++) grid[idx(r,c)]=WALL;
  render();
}

function setMode(m){
  mode=m;
  ['fall','pile','wind','water'].forEach(k=>document.getElementById('mode-'+k).classList.toggle('on',k===m));
  document.getElementById('modeDesc').textContent=MODE_DESC[m];
  document.getElementById('rowWind').style.display = m==='wind'?'':'none';
  document.getElementById('secPile').style.display = m==='pile'?'':'none';
  if(m==='pile'){ clearAll(); }
}
function setMat(m){
  material=m;
  ['sand','wall','water','erase'].forEach(k=>document.getElementById('mat-'+k).classList.toggle('on',k===m));
}

function paint(x,y){
  const c=Math.floor(x/CS), r=Math.floor(y/CS);
  const br=+document.getElementById('sBrush').value;
  const type = material==='sand'?SAND: material==='wall'?WALL: material==='water'?WATER:EMPTY;
  for(let dr=-br;dr<=br;dr++) for(let dc=-br;dc<=br;dc++){
    if(dr*dr+dc*dc>br*br) continue;
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
    const ci=idx(nr,nc);
    if(material==='erase'){ grid[ci]=EMPTY; if(pileH)pileH[ci]=0; }
    else if(material==='sand'||material==='water'){
      if(grid[ci]===EMPTY && Math.random()<0.6){ grid[ci]=type; if(mode==='pile'&&type===SAND)pileH[ci]=1; }
    } else {
      grid[ci]=type;
    }
  }
}

function stepFall(){
  avalancheSize=0;
  const angle=+document.getElementById('sAngle').value;
  for(let r=ROWS-2;r>=0;r--){
    const ltr=(r%2===0);
    for(let k=0;k<COLS;k++){
      const c = ltr? k : COLS-1-k;
      const i=idx(r,c);
      const t=grid[i];
      if(t===SAND){
        const below=idx(r+1,c);
        if(grid[below]===EMPTY){ grid[below]=SAND; grid[i]=EMPTY; avalancheSize++; }
        else if(grid[below]===WATER){ grid[below]=SAND; grid[i]=WATER; avalancheSize++; }
        else {
          const dl=(c>0)?idx(r+1,c-1):-1;
          const dr2=(c<COLS-1)?idx(r+1,c+1):-1;
          const canL = dl>=0 && (grid[dl]===EMPTY||grid[dl]===WATER);
          const canR = dr2>=0 && (grid[dr2]===EMPTY||grid[dr2]===WATER);
          const slip = Math.random() < (1/angle);
          if(slip && (canL||canR)){
            let dir;
            if(canL&&canR) dir = Math.random()<0.5?dl:dr2;
            else dir = canL?dl:dr2;
            if(grid[dir]===WATER){grid[dir]=SAND;grid[i]=WATER;}
            else {grid[dir]=SAND;grid[i]=EMPTY;}
            avalancheSize++;
          }
        }
      } else if(t===WATER){
        stepWaterCell(r,c,i);
      }
    }
  }
}

function stepWaterCell(r,c,i){
  if(r>=ROWS-1) return;
  const below=idx(r+1,c);
  if(grid[below]===EMPTY){ grid[below]=WATER; grid[i]=EMPTY; return; }
  const dl=(c>0)?idx(r,c-1):-1;
  const dr2=(c<COLS-1)?idx(r,c+1):-1;
  const downL=(c>0)?idx(r+1,c-1):-1;
  const downR=(c<COLS-1)?idx(r+1,c+1):-1;
  if(downL>=0&&grid[downL]===EMPTY){grid[downL]=WATER;grid[i]=EMPTY;return;}
  if(downR>=0&&grid[downR]===EMPTY){grid[downR]=WATER;grid[i]=EMPTY;return;}
  const canL=dl>=0&&grid[dl]===EMPTY, canR=dr2>=0&&grid[dr2]===EMPTY;
  if(canL&&canR){ const d=Math.random()<0.5?dl:dr2; grid[d]=WATER; grid[i]=EMPTY; }
  else if(canL){ grid[dl]=WATER; grid[i]=EMPTY; }
  else if(canR){ grid[dr2]=WATER; grid[i]=EMPTY; }
}

function stepPile(){
  avalancheSize=0;
  const crit=+document.getElementById('sCrit').value;
  const h=pileH;
  if(document.getElementById('togRain').checked){
    const cc=Math.floor(COLS/2), cr=Math.floor(ROWS/2);
    h[idx(cr,cc)]+=1; grainCount++;
  }
  let toppled=true, passes=0;
  while(toppled && passes<4){
    toppled=false; passes++;
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const i=idx(r,c);
      if(h[i]>=crit){
        const give=Math.floor(h[i]/4);
        h[i]-=give*4;
        if(r>0) h[idx(r-1,c)]+=give;
        if(r<ROWS-1) h[idx(r+1,c)]+=give;
        if(c>0) h[idx(r,c-1)]+=give;
        if(c<COLS-1) h[idx(r,c+1)]+=give;
        avalancheSize+=give*4;
        toppled=true;
      }
    }
  }
  for(let i=0;i<N;i++) grid[i] = h[i]>0?SAND:EMPTY;
}

function stepWind(){
  avalancheSize=0;
  const wind=+document.getElementById('sWind').value;
  stepFall();
  if(wind>0){
    for(let pass=0;pass<wind;pass++){
      for(let r=1;r<ROWS-1;r++){
        for(let c=0;c<COLS-1;c++){
          const i=idx(r,c);
          if(grid[i]===SAND && grid[idx(r-1,c)]===EMPTY){
            if(Math.random()<0.15){
              const tc=Math.min(COLS-1,c+1+Math.floor(Math.random()*3));
              for(let rr=0;rr<ROWS-1;rr++){
                if(grid[idx(rr+1,tc)]!==EMPTY && grid[idx(rr,tc)]===EMPTY){
                  grid[idx(rr,tc)]=SAND; grid[i]=EMPTY; avalancheSize++;
                  break;
                }
              }
            }
          }
        }
      }
    }
  }
}

function step(){
  const iters=+document.getElementById('sIter').value;
  for(let it=0;it<iters;it++){
    if(mode==='pile') stepPile();
    else if(mode==='wind') stepWind();
    else stepFall();
  }
  if(mode!=='pile'){
    let cnt=0; for(let i=0;i<N;i++) if(grid[i]===SAND) cnt++;
    grainCount=cnt;
  }
  avalancheDisplay=avalancheDisplay*0.7+avalancheSize*0.3;
}

function render(){
  const W=canvas.width;
  const showHeight=document.getElementById('togHeight').checked;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const i=idx(r,c);
      const t=grid[i];
      let R,G,B;
      if(t===EMPTY){ R=12;G=10;B=7; }
      else if(t===WALL){ R=80;G=74;B=64; }
      else if(t===WATER){ R=40;G=90;B=150; }
      else {
        if(showHeight){
          const depth=r/ROWS;
          R=Math.min(255,200+depth*55|0); G=Math.min(255,160+depth*40|0); B=Math.min(255,70+depth*30|0);
          const n=((r*13+c*7)%24)-12;
          R=Math.max(0,Math.min(255,R+n));G=Math.max(0,Math.min(255,G+n));
        } else {
          const n=((r*13+c*7)%30)-15;
          R=Math.max(0,Math.min(255,222+n)); G=Math.max(0,Math.min(255,180+n)); B=Math.max(0,Math.min(255,110+n));
        }
      }
      for(let dy=0;dy<CS;dy++) for(let dx=0;dx<CS;dx++){
        const px=((r*CS+dy)*W+(c*CS+dx))*4;
        buf[px]=R;buf[px+1]=G;buf[px+2]=B;buf[px+3]=255;
      }
    }
  }
  ctx.putImageData(imgData,0,0);
}

function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){
    document.getElementById('statFps').textContent=fpsFrames;
    fpsFrames=0; fpsLast=now;
  }
  if(painting) paint(paintX,paintY);
  if(running) step();
  render();
  document.getElementById('statGrains').textContent=grainCount.toLocaleString();
  document.getElementById('statAval').textContent=Math.round(avalancheDisplay);
  document.getElementById('avalFill').style.width=Math.min(100,avalancheDisplay/3)+'%';
}

function togglePlay(){
  running=!running;
  const btn=document.getElementById('btnPlay');
  btn.textContent=running?'■ pause':'▶ resume';
  btn.classList.toggle('running',running);
}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>rebuild());

canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();painting=true;paintX=e.clientX-r.left;paintY=e.clientY-r.top;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();paintX=e.clientX-r.left;paintY=e.clientY-r.top;});
document.addEventListener('mouseup',()=>painting=false);

setMode('fall');
rebuild();
fillFloor();
loop();
</script>
</body>
</html>
