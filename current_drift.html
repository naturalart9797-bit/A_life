<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Drift</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03060c;--surface:#080d16;--border:#142030;--border2:#1f2f44;
  --accent:#4fc4d9;--accent2:#2a8aa6;
  --text:#cce8f0;--text2:#5a7c8c;--text3:#223341;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:18px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(79,196,217,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(79,196,217,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(79,196,217,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">Current <em>//</em> Drift</div>
  <div class="stats">
    <div class="stat"><span class="stat-label">幼生</span><span class="stat-val" id="statN">0</span></div>
    <div class="stat"><span class="stat-label">定着</span><span class="stat-val" id="statSettled">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="reset()">リセット</button>
        <button style="flex:1" onclick="newFlow()">流れを再生成</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">潮流（フローフィールド）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">流れの強さ</span><span class="sl-val" id="vFlowStr">1.3</span></div>
        <input type="range" min="0.2" max="4" value="1.3" step="0.1" id="sFlowStr" oninput="vFlowStr.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">流れの細かさ</span><span class="sl-val" id="vFlowScale">3.0</span></div>
        <input type="range" min="0.5" max="8" value="3.0" step="0.5" id="sFlowScale" oninput="vFlowScale.textContent=(+this.value).toFixed(1);buildFlow()">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">流れの変化速度</span><span class="sl-val" id="vFlowDrift">0.4</span></div>
        <input type="range" min="0" max="2" value="0.4" step="0.1" id="sFlowDrift" oninput="vFlowDrift.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">全体ドリフト方向°</span><span class="sl-val" id="vBias">0</span></div>
        <input type="range" min="0" max="360" value="0" step="5" id="sBias" oninput="vBias.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">全体ドリフト量</span><span class="sl-val" id="vBiasAmt">0.3</span></div>
        <input type="range" min="0" max="2" value="0.3" step="0.1" id="sBiasAmt" oninput="vBiasAmt.textContent=(+this.value).toFixed(1)">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">幼生（プランクトン）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">放出数</span><span class="sl-val" id="vN">3000</span></div>
        <input type="range" min="500" max="12000" value="3000" step="500" id="sN" oninput="vN.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">放出速度</span><span class="sl-val" id="vEmit">20</span></div>
        <input type="range" min="0" max="80" value="20" step="5" id="sEmit" oninput="vEmit.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">定着しやすさ</span><span class="sl-val" id="vStick">0.30</span></div>
        <input type="range" min="0.02" max="1" value="0.30" step="0.02" id="sStick" oninput="vStick.textContent=(+this.value).toFixed(2)">
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:4px;line-height:1.7;">既に定着したサンゴの近くに来た幼生が定着→成長します（DLA的拡大）</div>
    </div>

    <div class="sec">
      <div class="sec-title">放出源</div>
      <div class="preset-grid">
        <button onclick="setSource('center')">中央</button>
        <button onclick="setSource('left')">左から</button>
        <button onclick="setSource('top')">上から</button>
        <button onclick="setSource('corners')">四隅</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:6px;">クリックで基盤（定着核）を追加</div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="tog-row"><span class="tog-label">流れの線を表示</span>
        <label class="tog"><input type="checkbox" id="togFlowViz"><div class="tog-track"></div></label>
      </div>
      <div class="tog-row"><span class="tog-label">幼生の軌跡（残像）</span>
        <label class="tog"><input type="checkbox" id="togTrail" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      サンゴの幼生が潮流に運ばれ、<br>
      既存のサンゴに触れると定着して成長。<br>
      流れのパターンが定着の形を決めます
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">クリックで定着核を追加 / Space: pause</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');

let W=0,H=0;
let particles=[]; // {x,y,vx,vy,alive}
let settledGrid; // Uint8Array marking settled coral cells
let settledHue;  // Uint16Array
const GRIDSCALE=3;
let GW=0,GH=0;
let flowSeed=Math.random()*1000;
let time=0;
let running=true;
let fpsFrames=0,fpsLast=performance.now();
let sourceMode='center';
let settledCount=0;

// ── Simple value noise for flow field ──
function hash(x,y){
  let n=Math.sin(x*127.1+y*311.7+flowSeed)*43758.5453;
  return n-Math.floor(n);
}
function smoothNoise(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  const a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);
  return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;
}
function buildFlow(){ /* parameters read live; nothing to precompute */ }
function newFlow(){ flowSeed=Math.random()*1000; }

function flowAngle(x,y,t){
  const scale=+document.getElementById('sFlowScale').value/1000;
  const drift=+document.getElementById('sFlowDrift').value;
  const n=smoothNoise(x*scale*8, y*scale*8 + t*drift*0.3);
  return n*Math.PI*4;
}

// ── Setup ──
function reset(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/GRIDSCALE); GH=Math.floor(H/GRIDSCALE);
  settledGrid=new Uint8Array(GW*GH);
  settledHue=new Uint16Array(GW*GH);
  particles=[];
  settledCount=0;
  time=0;
  ctx.fillStyle='#03060c'; ctx.fillRect(0,0,W,H);

  // Initial settled seed at bottom center (substrate)
  const scx=Math.floor(GW/2), scy=GH-2;
  plantSeed(scx,scy);
  // a few along bottom
  for(let i=0;i<5;i++) plantSeed(Math.floor(Math.random()*GW), GH-1-Math.floor(Math.random()*2));

  updateStats();
}

function plantSeed(gx,gy){
  if(gx<0||gx>=GW||gy<0||gy>=GH) return;
  const i=gy*GW+gx;
  if(!settledGrid[i]){settledGrid[i]=1;settledHue[i]=180+Math.random()*60;settledCount++;}
}

function setSource(m){sourceMode=m;}

function emitParticle(){
  let x,y;
  if(sourceMode==='center'){x=W/2+(Math.random()-0.5)*40;y=H/2+(Math.random()-0.5)*40;}
  else if(sourceMode==='left'){x=10;y=Math.random()*H;}
  else if(sourceMode==='top'){x=Math.random()*W;y=10;}
  else {const cx=Math.random()<0.5?20:W-20,cy=Math.random()<0.5?20:H-20;x=cx;y=cy;}
  particles.push({x,y,vx:0,vy:0});
}

// ── Step ──
function step(){
  time++;
  const maxN=+document.getElementById('sN').value;
  const emit=+document.getElementById('sEmit').value;
  const flowStr=+document.getElementById('sFlowStr').value;
  const stick=+document.getElementById('sStick').value;
  const biasAng=+document.getElementById('sBias').value*Math.PI/180;
  const biasAmt=+document.getElementById('sBiasAmt').value;

  for(let e=0;e<emit && particles.length<maxN;e++) emitParticle();

  const bvx=Math.cos(biasAng)*biasAmt, bvy=Math.sin(biasAng)*biasAmt;

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    const ang=flowAngle(p.x,p.y,time);
    p.vx=p.vx*0.8 + (Math.cos(ang)*flowStr+bvx)*0.2;
    p.vy=p.vy*0.8 + (Math.sin(ang)*flowStr+bvy)*0.2;
    p.x+=p.vx; p.y+=p.vy;

    // Wrap horizontally, respawn if out vertically
    if(p.x<0)p.x+=W; else if(p.x>=W)p.x-=W;
    if(p.y<0||p.y>=H){ particles.splice(i,1); continue; }

    // Check settlement: near a settled cell?
    const gx=Math.floor(p.x/GRIDSCALE), gy=Math.floor(p.y/GRIDSCALE);
    if(gx<1||gx>=GW-1||gy<1||gy>=GH-1) continue;
    let adj=false, parentHue=180;
    for(let dy=-1;dy<=1 && !adj;dy++) for(let dx=-1;dx<=1;dx++){
      const ni=(gy+dy)*GW+(gx+dx);
      if(settledGrid[ni]){adj=true;parentHue=settledHue[ni];break;}
    }
    if(adj && Math.random()<stick){
      const idx=gy*GW+gx;
      if(!settledGrid[idx]){
        settledGrid[idx]=1;
        settledHue[idx]=(parentHue+(Math.random()*12-6)+360)%360;
        settledCount++;
      }
      particles.splice(i,1);
    }
  }
  updateStats();
}

function updateStats(){
  document.getElementById('statN').textContent=particles.length.toLocaleString();
  document.getElementById('statSettled').textContent=settledCount.toLocaleString();
}

// ── Color ──
function hslToRgb(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return [(r+m)*255|0,(g+m)*255|0,(b+m)*255|0];
}

// ── Render ──
function render(){
  const trailOn=document.getElementById('togTrail').checked;
  if(trailOn){
    ctx.fillStyle='rgba(3,6,12,0.16)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle='#03060c';
    ctx.fillRect(0,0,W,H);
  }

  // Flow viz
  if(document.getElementById('togFlowViz').checked){
    ctx.strokeStyle='rgba(79,196,217,0.10)';
    ctx.lineWidth=1;
    const step=28;
    for(let y=step/2;y<H;y+=step) for(let x=step/2;x<W;x+=step){
      const a=flowAngle(x,y,time);
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(a)*12,y+Math.sin(a)*12);ctx.stroke();
    }
  }

  // Settled coral (draw as filled grid blocks)
  for(let gy=0;gy<GH;gy++) for(let gx=0;gx<GW;gx++){
    const idx=gy*GW+gx;
    if(!settledGrid[idx]) continue;
    const [r,g,b]=hslToRgb(settledHue[idx],60,55);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(gx*GRIDSCALE,gy*GRIDSCALE,GRIDSCALE,GRIDSCALE);
  }

  // Particles
  for(const p of particles){
    const sp=Math.min(1,Math.hypot(p.vx,p.vy)/3);
    ctx.fillStyle=`rgba(${120+sp*135|0},${210},${230},0.7)`;
    ctx.fillRect(p.x-0.5,p.y-0.5,1.6,1.6);
  }
}

// ── Loop ──
function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){
    document.getElementById('statFps').textContent=fpsFrames;
    fpsFrames=0; fpsLast=now;
  }
  if(running) step();
  render();
}

// ── Controls ──
function togglePlay(){
  running=!running;
  const btn=document.getElementById('btnPlay');
  btn.textContent=running?'■ pause':'▶ resume';
  btn.classList.toggle('running',running);
}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());

canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  const gx=Math.floor((e.clientX-rect.left)/GRIDSCALE);
  const gy=Math.floor((e.clientY-rect.top)/GRIDSCALE);
  plantSeed(gx,gy);
  updateStats();
});

// ── Boot ──
reset();
loop();
</script>
</body>
</html>
