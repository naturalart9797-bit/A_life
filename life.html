<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e0d; --surface: #111714; --border: #1f2e22;
    --accent: #1D9E75; --accent2: #0f6e56;
    --text: #c8e8d0; --text2: #6a9e78; --text3: #3d5e46;
    --font-mono: 'IBM Plex Mono', monospace; --font-ui: 'IBM Plex Sans JP', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
  header { display: flex; align-items: center; gap: 16px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .logo span { color: var(--text3); }
  .stats { margin-left: auto; display: flex; gap: 24px; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .stat-val { font-family: var(--font-mono); font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .section-title { font-family: var(--font-mono); font-size: 9px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  button { font-family: var(--font-mono); font-size: 11px; font-weight: 500; background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 3px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; white-space: nowrap; }
  button:hover { border-color: var(--accent2); color: var(--accent); background: rgba(29,158,117,0.06); }
  button.active { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(29,158,117,0.12) !important; }
  button.danger:hover { border-color: #c0392b; color: #e74c3c; background: rgba(231,76,60,0.06); }
  .play-btn { width: 100%; padding: 8px; font-size: 12px; border-color: var(--accent2); color: var(--accent); letter-spacing: 0.1em; }
  .play-btn.running { background: rgba(29,158,117,0.1); }
  .slider-row { margin-bottom: 10px; }
  .slider-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .slider-name { font-family: var(--font-mono); font-size: 10px; color: var(--text2); }
  .slider-val { font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: var(--border); border-radius: 1px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .rule-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; margin-bottom: 8px; }
  .rule-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .rtag { font-family: var(--font-mono); font-size: 10px; background: transparent; border: 1px solid var(--border); color: var(--text3); padding: 4px 2px; border-radius: 2px; cursor: pointer; text-align: center; transition: all 0.1s; }
  .rtag.on { border-color: var(--accent); color: var(--accent); background: rgba(29,158,117,0.12); }
  .preset-list { display: flex; flex-direction: column; gap: 3px; }
  .preset-btn { text-align: left; padding: 6px 10px; font-size: 11px; width: 100%; }
  .canvas-wrap { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
  canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
  .generation-bar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; pointer-events: none; }
  .rule-notation { font-family: var(--font-mono); font-size: 11px; color: var(--accent2); margin-top: 6px; letter-spacing: 0.05em; }
  .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .color-label { font-family: var(--font-mono); font-size: 10px; color: var(--text2); }
  .color-pick-wrap { display: flex; align-items: center; gap: 6px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; }
  input[type=color] { width: 0; height: 0; opacity: 0; position: absolute; pointer-events: none; }
  .color-hex { font-family: var(--font-mono); font-size: 10px; width: 56px; background: transparent; border: 1px solid var(--border); border-radius: 2px; padding: 2px 4px; color: var(--text2); outline: none; }
  .color-hex:focus { border-color: var(--accent2); }
  .theme-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
  .theme-chip { display: flex; gap: 2px; padding: 4px 6px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); transition: border-color 0.1s; }
  .theme-chip:hover { border-color: var(--accent2); }
  .theme-chip span { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }
  .mode-btns { display: flex; gap: 4px; }
  .mode-btn { flex: 1; padding: 6px 4px; font-size: 11px; text-align: center; }
  .neighbor-info { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 6px; line-height: 1.7; }
</style>
</head>
<body>
<header>
  <div class="logo">Game <span>//</span> of Life</div>
  <div class="stats">
    <div class="stat"><span class="stat-label">世代</span><span class="stat-val" id="genCnt">0</span></div>
    <div class="stat"><span class="stat-label">生存</span><span class="stat-val" id="aliveCnt">0</span></div>
    <div class="stat"><span class="stat-label">モード</span><span class="stat-val" id="modeLbl">□</span></div>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="section">
      <button class="play-btn" id="btnPlay" onclick="togglePlay()">▶ スタート</button>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button style="flex:1" onclick="stepSim()">1ステップ</button>
        <button style="flex:1;color:var(--text3)" class="danger" onclick="clearGrid()">クリア</button>
      </div>
    </div>

    <!-- GRID MODE -->
    <div class="section">
      <div class="section-title">グリッドモード</div>
      <div class="mode-btns">
        <button class="mode-btn active" id="modeSquare" onclick="setMode('square')">□ 四角形</button>
        <button class="mode-btn" id="modeHex" onclick="setMode('hex')">⬡ 六角形</button>
        <button class="mode-btn" id="modeTri" onclick="setMode('tri')">△ 三角形</button>
      </div>
      <div class="neighbor-info" id="neighborInfo">近傍: 8（Moore）</div>
    </div>

    <div class="section">
      <div class="section-title">パラメータ</div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-name">速度</span><span class="slider-val" id="fpsOut">10</span></div>
        <input type="range" min="1" max="60" value="10" step="1" id="speed" oninput="fpsOut.textContent=this.value;setFPS(+this.value)">
      </div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-name">セルサイズ</span><span class="slider-val" id="csOut">14</span></div>
        <input type="range" min="4" max="30" value="14" step="1" id="cellSize" oninput="csOut.textContent=this.value;rebuildCanvas()">
      </div>
      <div class="slider-row">
        <div class="slider-header"><span class="slider-name">ランダム密度</span><span class="slider-val" id="densOut">30%</span></div>
        <input type="range" min="5" max="70" value="30" step="1" id="density" oninput="densOut.textContent=this.value+'%'">
      </div>
    </div>

    <div class="section">
      <div class="section-title">ルール</div>
      <div class="rule-label">生存（S）</div>
      <div id="survTags"></div>
      <div class="rule-label" style="margin-top:6px;">誕生（B）</div>
      <div id="bornTags"></div>
      <div class="rule-notation" id="ruleNotation">B3/S23</div>
      <div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;" id="rulePresets"></div>
    </div>

    <div class="section">
      <div class="section-title">カラー</div>
      <div class="color-row">
        <span class="color-label">生存セル</span>
        <div class="color-pick-wrap">
          <div class="color-swatch" id="swAlive" style="background:#1D9E75" onclick="openPicker('pickerAlive')"></div>
          <input type="color" id="pickerAlive" value="#1D9E75" oninput="setColor('alive',this.value)">
          <input type="text" class="color-hex" id="hexAlive" value="#1D9E75" oninput="onHexInput('alive',this.value)" maxlength="7">
        </div>
      </div>
      <div class="color-row">
        <span class="color-label">背景</span>
        <div class="color-pick-wrap">
          <div class="color-swatch" id="swBg" style="background:#0a0e0d" onclick="openPicker('pickerBg')"></div>
          <input type="color" id="pickerBg" value="#0a0e0d" oninput="setColor('bg',this.value)">
          <input type="text" class="color-hex" id="hexBg" value="#0a0e0d" oninput="onHexInput('bg',this.value)" maxlength="7">
        </div>
      </div>
      <div class="color-row">
        <span class="color-label">ハイライト</span>
        <div class="color-pick-wrap">
          <div class="color-swatch" id="swHi" style="background:#5DCAA5" onclick="openPicker('pickerHi')"></div>
          <input type="color" id="pickerHi" value="#5DCAA5" oninput="setColor('hi',this.value)">
          <input type="text" class="color-hex" id="hexHi" value="#5DCAA5" oninput="onHexInput('hi',this.value)" maxlength="7">
        </div>
      </div>
      <div style="margin-top:6px;">
        <div class="rule-label" style="margin-bottom:6px;">テーマプリセット</div>
        <div class="theme-chips" id="themeChips"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">プリセット</div>
      <div class="preset-list" id="presetList"></div>
    </div>

    <div class="section" style="font-family:var(--font-mono);font-size:10px;color:var(--text3);line-height:1.8;">
      クリック/ドラッグでセルを描く<br>
      右クリックで消す
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="life"></canvas>
    <div class="generation-bar" id="genBar">GEN 0</div>
  </div>
</div>

<script>
// ── Mode definitions ───────────────────────────────────────────
const MODES = {
  square: {
    label: '□', name: '四角形',
    maxNeighbors: 8,
    defaultSurvive: [2,3], defaultBorn: [3],
    rulePresets: [
      { label:'Conway', s:'23', b:'3' },
      { label:'HighLife', s:'23', b:'36' },
      { label:'Maze', s:'12345', b:'3' },
      { label:'Morley', s:'245', b:'368' },
      { label:'Coral', s:'45678', b:'3' },
    ],
    presets: ['glider','blinker','toad','beacon','pulsar','glidergun','random'],
    neighborInfo: '近傍: 8（Moore隣接）'
  },
  hex: {
    label: '⬡', name: '六角形',
    maxNeighbors: 6,
    defaultSurvive: [2,3], defaultBorn: [2],
    rulePresets: [
      { label:'B2/S23', s:'23', b:'2' },
      { label:'B2/S34', s:'34', b:'2' },
      { label:'B3/S23', s:'23', b:'3' },
      { label:'Glider6', s:'35', b:'2' },
    ],
    presets: ['random','blob','stripe'],
    neighborInfo: '近傍: 6（六角形隣接）'
  },
  tri: {
    label: '△', name: '三角形',
    maxNeighbors: 12,
    defaultSurvive: [3,4], defaultBorn: [2],
    rulePresets: [
      { label:'B2/S34', s:'34', b:'2' },
      { label:'B23/S34', s:'34', b:'23' },
      { label:'B3/S456', s:'456', b:'3' },
      { label:'Chaos', s:'2345', b:'234' },
    ],
    presets: ['random','blob','stripe'],
    neighborInfo: '近傍: 3辺 + 9頂点（最大12）'
  }
};

let mode = 'square';
let grid = [], nextGrid = [];
let COLS = 0, ROWS = 0;
let survive = new Set([2,3]), born = new Set([3]);
let running = false, simInterval = null, gen = 0;
let painting = false, paintVal = 1;
let colors = { alive: '#1D9E75', bg: '#0a0e0d', hi: '#5DCAA5' };

const THEMES = [
  { alive:'#1D9E75', bg:'#0a0e0d', hi:'#5DCAA5' },
  { alive:'#e8e8e8', bg:'#080808', hi:'#ffffff' },
  { alive:'#e24b4a', bg:'#100808', hi:'#f09595' },
  { alive:'#378ADD', bg:'#060c14', hi:'#85B7EB' },
  { alive:'#EF9F27', bg:'#0e0a04', hi:'#FAC775' },
  { alive:'#D4537E', bg:'#0e060a', hi:'#ED93B1' },
  { alive:'#c084fc', bg:'#050008', hi:'#e9d5ff' },
];

const canvas = document.getElementById('life');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// ── Grid size helpers ──────────────────────────────────────────
function getCS() { return +document.getElementById('cellSize').value; }

function computeGridDims() {
  const cs = getCS();
  const W = wrap.clientWidth, H = wrap.clientHeight;
  if (mode === 'square') {
    COLS = Math.floor(W / cs);
    ROWS = Math.floor(H / cs);
  } else if (mode === 'hex') {
    // flat-top hexagons: w = cs*2, h = cs*sqrt(3)
    const hw = cs * 2, hh = cs * Math.sqrt(3);
    COLS = Math.floor(W / (hw * 0.75)) + 1;
    ROWS = Math.floor(H / hh) + 1;
  } else { // tri
    const tw = cs, th = cs * Math.sqrt(3) / 2;
    COLS = Math.floor(W / tw) + 2;
    ROWS = Math.floor(H / th) + 2;
  }
}

function makeGrid() { return Array.from({length: ROWS}, () => new Uint8Array(COLS)); }

// ── Neighbor functions ─────────────────────────────────────────
function getNeighborsSquare(r, c) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    if (dr === 0 && dc === 0) continue;
    n += grid[(r+dr+ROWS)%ROWS][(c+dc+COLS)%COLS];
  }
  return n;
}

// Hex neighbors (offset grid, flat-top)
// Even columns: neighbors differ from odd columns
function getNeighborsHex(r, c) {
  let n = 0;
  // flat-top hex, offset coords
  const isEven = c % 2 === 0;
  const dirs = isEven
    ? [[-1,0],[1,0],[0,-1],[0,1],[-1,-1],[-1,1]]
    : [[-1,0],[1,0],[0,-1],[0,1],[1,-1],[1,1]];
  for (const [dr,dc] of dirs) {
    const nr = (r+dr+ROWS)%ROWS, nc = (c+dc+COLS)%COLS;
    n += grid[nr][nc];
  }
  return n;
}

// Triangle neighbors
// Each cell is either pointing up (▲) or down (▽)
// isDown = (row + col) % 2 === 1
function getNeighborsTri(r, c) {
  let n = 0;
  const isDown = (r + c) % 2 === 1;
  // 3 edge-neighbors
  const edgeDirs = isDown
    ? [[0,-1],[0,1],[-1,0]]   // ▽: left, right, above
    : [[0,-1],[0,1],[1,0]];   // ▲: left, right, below
  for (const [dr,dc] of edgeDirs) {
    const nr = (r+dr+ROWS)%ROWS, nc = (c+dc+COLS)%COLS;
    n += grid[nr][nc];
  }
  // 9 vertex-neighbors (2 rows away, diagonals, etc.)
  const vertexDirs = [
    [-1,-1],[-1,0],[-1,1],
    [0,-2],[0,2],
    [1,-1],[1,0],[1,1],
    isDown ? [-2,0] : [2,0]
  ];
  for (const [dr,dc] of vertexDirs) {
    const nr = (r+dr+ROWS)%ROWS, nc = (c+dc+COLS)%COLS;
    n += grid[nr][nc];
  }
  return n;
}

function countNeighbors(r, c) {
  if (mode === 'square') return getNeighborsSquare(r, c);
  if (mode === 'hex') return getNeighborsHex(r, c);
  return getNeighborsTri(r, c);
}

// ── Step ───────────────────────────────────────────────────────
function stepSim() {
  let alive = 0;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const n = countNeighbors(r, c);
    nextGrid[r][c] = grid[r][c] ? (survive.has(n)?1:0) : (born.has(n)?1:0);
    if (nextGrid[r][c]) alive++;
  }
  [grid, nextGrid] = [nextGrid, grid];
  gen++;
  document.getElementById('genCnt').textContent = gen.toLocaleString();
  document.getElementById('aliveCnt').textContent = alive.toLocaleString();
  document.getElementById('genBar').textContent = 'GEN ' + gen.toLocaleString();
  draw();
}

// ── Draw ───────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (mode === 'square') drawSquare();
  else if (mode === 'hex') drawHex();
  else drawTri();
}

function drawSquare() {
  const cs = getCS();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (!grid[r][c]) continue;
    ctx.fillStyle = Math.random() > 0.97 ? colors.hi : colors.alive;
    ctx.fillRect(c*cs+1, r*cs+1, cs-1, cs-1);
  }
}

function drawHex() {
  const cs = getCS();
  const hw = cs * 2, hh = cs * Math.sqrt(3);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const cx = c * hw * 0.75 + cs;
    const cy = r * hh + (c % 2 === 0 ? 0 : hh / 2) + hh / 2;
    if (grid[r][c]) {
      ctx.fillStyle = Math.random() > 0.97 ? colors.hi : colors.alive;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
    }
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 180 * (60 * i);
      const px = cx + cs * Math.cos(angle);
      const py = cy + cs * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    // thin border
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function drawTri() {
  const cs = getCS();
  const th = cs * Math.sqrt(3) / 2;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const isDown = (r + c) % 2 === 1;
    const x = c * cs * 0.5;
    const y = r * th;
    ctx.beginPath();
    if (!isDown) {
      // ▲ pointing up
      ctx.moveTo(x + cs * 0.5, y);
      ctx.lineTo(x + cs, y + th);
      ctx.lineTo(x, y + th);
    } else {
      // ▽ pointing down
      ctx.moveTo(x, y);
      ctx.lineTo(x + cs, y);
      ctx.lineTo(x + cs * 0.5, y + th);
    }
    ctx.closePath();
    if (grid[r][c]) {
      ctx.fillStyle = Math.random() > 0.97 ? colors.hi : colors.alive;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.025)';
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

// ── Cell from click ────────────────────────────────────────────
function cellFromXY(x, y) {
  const cs = getCS();
  if (mode === 'square') {
    return [Math.floor(y / cs), Math.floor(x / cs)];
  } else if (mode === 'hex') {
    const hw = cs * 2, hh = cs * Math.sqrt(3);
    // Approximate column first
    let bestR = -1, bestC = -1, bestDist = Infinity;
    const cApprox = Math.round(x / (hw * 0.75));
    for (let c = Math.max(0, cApprox - 2); c <= Math.min(COLS - 1, cApprox + 2); c++) {
      const cx = c * hw * 0.75 + cs;
      const cy0 = (c % 2 === 0 ? 0 : hh / 2) + hh / 2;
      const r = Math.round((y - cy0) / hh);
      for (let dr = -1; dr <= 1; dr++) {
        const nr = r + dr;
        if (nr < 0 || nr >= ROWS) continue;
        const cy = cy0 + nr * hh;
        const d = Math.hypot(x - cx, y - cy);
        if (d < bestDist) { bestDist = d; bestR = nr; bestC = c; }
      }
    }
    return [bestR, bestC];
  } else {
    const th = cs * Math.sqrt(3) / 2;
    const c = Math.floor(x / (cs * 0.5));
    const r = Math.floor(y / th);
    return [r, c];
  }
}

// ── Playback ───────────────────────────────────────────────────
function togglePlay() {
  running = !running;
  const btn = document.getElementById('btnPlay');
  if (running) { btn.textContent = '■ ストップ'; btn.classList.add('running'); setFPS(+document.getElementById('speed').value); }
  else { btn.textContent = '▶ スタート'; btn.classList.remove('running'); clearInterval(simInterval); }
}
function setFPS(fps) { clearInterval(simInterval); if (running) simInterval = setInterval(stepSim, 1000/fps); }
function clearGrid() { grid.forEach(r => r.fill(0)); gen = 0; document.getElementById('genCnt').textContent = '0'; document.getElementById('aliveCnt').textContent = '0'; document.getElementById('genBar').textContent = 'GEN 0'; draw(); }

// ── Mode switching ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('modeLbl').textContent = MODES[m].label;
  ['square','hex','tri'].forEach(k => document.getElementById('mode'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active', k === m));
  document.getElementById('neighborInfo').textContent = MODES[m].neighborInfo;
  survive = new Set(MODES[m].defaultSurvive);
  born = new Set(MODES[m].defaultBorn);
  buildRuleTags();
  buildRulePresets();
  buildPresetList();
  rebuildCanvas();
}

// ── Rebuild canvas & grid ─────────────────────────────────────
function rebuildCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  computeGridDims();
  grid = makeGrid();
  nextGrid = makeGrid();
  gen = 0;
  document.getElementById('genCnt').textContent = '0';
  document.getElementById('aliveCnt').textContent = '0';
  loadPreset('random');
}

// ── Presets ────────────────────────────────────────────────────
function loadPreset(name) {
  clearGrid();
  const dens = +document.getElementById('density').value / 100;
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  const set = (r,c) => { if(r>=0&&r<ROWS&&c>=0&&c<COLS) grid[r][c]=1; };

  if (name === 'random') {
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) grid[r][c] = Math.random()<dens?1:0;
  } else if (name === 'blob') {
    const rad = Math.floor(Math.min(ROWS,COLS)*0.15);
    for (let r=cy-rad;r<=cy+rad;r++) for (let c=cx-rad;c<=cx+rad;c++)
      if (Math.hypot(r-cy,c-cx)<rad && Math.random()<0.7) set(r,c);
  } else if (name === 'stripe') {
    for (let r=2;r<ROWS-2;r++) for (let c=2;c<COLS-2;c++) if ((r+c)%3===0) set(r,c);
  } else if (name === 'glider') {
    [[0,1],[1,2],[2,0],[2,1],[2,2]].forEach(([r,c])=>set(cy+r,cx+c));
  } else if (name === 'blinker') {
    [0,1,2].forEach(c=>set(cy,cx+c));
  } else if (name === 'toad') {
    [0,1,2].forEach(c=>set(cy,cx+c)); [1,2,3].forEach(c=>set(cy+1,cx+c));
  } else if (name === 'beacon') {
    set(cy,cx);set(cy,cx+1);set(cy+1,cx);set(cy+2,cx+3);set(cy+3,cx+2);set(cy+3,cx+3);
  } else if (name === 'pulsar') {
    const pts=[[0,2],[0,3],[0,4],[0,8],[0,9],[0,10],[2,0],[3,0],[4,0],[2,5],[3,5],[4,5],[2,7],[3,7],[4,7],[2,12],[3,12],[4,12],[5,2],[5,3],[5,4],[5,8],[5,9],[5,10]];
    const mirror=[];pts.forEach(([r,c])=>{mirror.push([r,c],[c,r],[12-r,c],[r,12-c],[12-r,12-c],[c,12-r],[12-c,r],[12-c,12-r]);});
    [...new Set(mirror.map(p=>p.join()))].map(s=>s.split(',').map(Number)).forEach(([r,c])=>set(cy-6+r,cx-6+c));
  } else if (name === 'glidergun') {
    const g=[[5,1],[5,2],[6,1],[6,2],[5,11],[6,11],[7,11],[4,12],[3,13],[3,14],[8,12],[9,13],[9,14],[6,15],[4,16],[5,17],[6,17],[7,17],[6,18],[8,16],[3,21],[4,21],[5,21],[3,22],[4,22],[5,22],[2,23],[6,23],[1,25],[2,25],[6,25],[7,25],[3,35],[4,35],[3,36],[4,36]];
    g.forEach(([r,c])=>set(r,c));
  }
  let alive=0; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]) alive++;
  document.getElementById('aliveCnt').textContent = alive.toLocaleString();
  draw();
}

function buildPresetList() {
  const list = document.getElementById('presetList');
  const names = { glider:'グライダー', blinker:'点滅体', toad:'ヒキガエル', beacon:'ビーコン', pulsar:'パルサー', glidergun:'グライダー砲', random:'ランダム', blob:'塊（Blob）', stripe:'縞模様' };
  list.innerHTML = '';
  MODES[mode].presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = names[p] || p;
    btn.onclick = () => loadPreset(p);
    list.appendChild(btn);
  });
}

// ── Rules ──────────────────────────────────────────────────────
function buildRuleTags() {
  const max = MODES[mode].maxNeighbors;
  ['surv','born'].forEach(type => {
    const el = document.getElementById(type+'Tags');
    el.innerHTML = '';
    el.style.cssText = 'display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;';
    const s = type==='surv' ? survive : born;
    for (let i = 0; i <= max; i++) {
      const tag = document.createElement('button');
      tag.className = 'rtag' + (s.has(i)?' on':'');
      tag.textContent = i;
      tag.onclick = () => { s.has(i)?s.delete(i):s.add(i); buildRuleTags(); updateRuleNotation(); };
      el.appendChild(tag);
    }
  });
  updateRuleNotation();
}

function updateRuleNotation() {
  const sStr = [...survive].sort((a,b)=>a-b).join('');
  const bStr = [...born].sort((a,b)=>a-b).join('');
  document.getElementById('ruleNotation').textContent = 'B'+bStr+'/S'+sStr;
}

function buildRulePresets() {
  const el = document.getElementById('rulePresets');
  el.innerHTML = '';
  MODES[mode].rulePresets.forEach(p => {
    const btn = document.createElement('button');
    btn.style.cssText = 'font-size:10px;padding:4px 7px;';
    btn.textContent = p.label;
    btn.onclick = () => {
      survive = new Set(p.s.split('').map(Number));
      born = new Set(p.b.split('').map(Number));
      buildRuleTags();
    };
    el.appendChild(btn);
  });
}

// ── Color ──────────────────────────────────────────────────────
function openPicker(id) { const el=document.getElementById(id); el.style.pointerEvents='auto'; el.click(); setTimeout(()=>el.style.pointerEvents='none',100); }
function setColor(key, val) {
  colors[key] = val;
  const cap = key.charAt(0).toUpperCase()+key.slice(1);
  document.getElementById('sw'+cap).style.background = val;
  document.getElementById('hex'+cap).value = val;
  if (key==='bg') { document.querySelector('.canvas-wrap').style.background=val; }
  draw();
}
function onHexInput(key, val) { if(/^#[0-9a-fA-F]{6}$/.test(val)) { document.getElementById('picker'+key.charAt(0).toUpperCase()+key.slice(1)).value=val; setColor(key,val); } }
function applyTheme(t) {
  Object.keys(t).forEach(k => { colors[k]=t[k]; const cap=k.charAt(0).toUpperCase()+k.slice(1); document.getElementById('sw'+cap).style.background=t[k]; document.getElementById('hex'+cap).value=t[k]; document.getElementById('picker'+cap).value=t[k]; });
  document.querySelector('.canvas-wrap').style.background=t.bg; draw();
}
function buildThemeChips() {
  const wrap2 = document.getElementById('themeChips');
  THEMES.forEach(t => {
    const chip = document.createElement('div'); chip.className='theme-chip'; chip.innerHTML=`<span style="background:${t.bg};border:1px solid #444"></span><span style="background:${t.alive}"></span>`; chip.onclick=()=>applyTheme(t); wrap2.appendChild(chip);
  });
}

// ── Mouse ──────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  e.preventDefault(); painting = true;
  const rect = canvas.getBoundingClientRect();
  const [r, c] = cellFromXY(e.clientX - rect.left, e.clientY - rect.top);
  if (r>=0&&r<ROWS&&c>=0&&c<COLS) { paintVal = e.button===2?0:(grid[r][c]?0:1); grid[r][c]=paintVal; draw(); }
});
canvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const rect = canvas.getBoundingClientRect();
  const [r, c] = cellFromXY(e.clientX - rect.left, e.clientY - rect.top);
  if (r>=0&&r<ROWS&&c>=0&&c<COLS) { grid[r][c]=paintVal; draw(); }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('mouseup', () => { painting=false; });

// ── Keys ───────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code==='Space') { e.preventDefault(); togglePlay(); }
  else if (e.code==='ArrowRight') stepSim();
  else if (e.code==='KeyC') clearGrid();
  else if (e.code==='KeyR') loadPreset('random');
  else if (e.code==='Digit1') setMode('square');
  else if (e.code==='Digit2') setMode('hex');
  else if (e.code==='Digit3') setMode('tri');
});

window.addEventListener('resize', () => { rebuildCanvas(); });

// ── Init ───────────────────────────────────────────────────────
buildThemeChips();
setMode('square');
</script>
</body>
