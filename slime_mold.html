<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Mold Network</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0805;--surface:#13100a;--border:#2a2416;--border2:#3a3220;
  --accent:#e0b850;--accent2:#a8852f;
  --text:#f0e6cc;--text2:#8a7d5a;--text3:#3a3220;
  --font-mono:'IBM Plex Mono',monospace;--font-ui:'IBM Plex Sans JP',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}
header{display:flex;align-items:center;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.logo em{color:var(--text3);font-style:normal;}
.stats{margin-left:auto;display:flex;gap:18px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;}
.stat-label{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.stat-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:256px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sec{padding:11px 13px;border-bottom:1px solid var(--border);}
.sec-title{font-family:var(--font-mono);font-size:8px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
button{font-family:var(--font-mono);font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
button:hover{border-color:var(--accent2);color:var(--accent);background:rgba(224,184,80,.07);}
button.on{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(224,184,80,.14)!important;}
.play-btn{width:100%;padding:7px;font-size:12px;border-color:var(--accent2);color:var(--accent);}
.play-btn.running{background:rgba(224,184,80,.1);}
.sl-row{margin-bottom:8px;}
.sl-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.sl-name{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.sl-val{font-family:var(--font-mono);font-size:10px;color:var(--accent);}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.tog-label{font-family:var(--font-mono);font-size:10px;color:var(--text2);}
.tog{position:relative;width:28px;height:14px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:8px;cursor:pointer;transition:background .2s;}
.tog input:checked+.tog-track{background:var(--accent2);}
.tog-track::after{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:var(--text3);border-radius:50%;transition:transform .2s,background .2s;}
.tog input:checked+.tog-track::after{transform:translateX(14px);background:var(--accent);}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;}
canvas{display:block;width:100%;height:100%;}
.hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text3);pointer-events:none;white-space:nowrap;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">Slime Mold <em>//</em> Physarum</div>
  <div class="stats">
    <div class="stat"><span class="stat-label">エージェント</span><span class="stat-val" id="statN">0</span></div>
    <div class="stat"><span class="stat-label">餌</span><span class="stat-val" id="statFood">0</span></div>
    <div class="stat"><span class="stat-label">fps</span><span class="stat-val" id="statFps">—</span></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="sec">
      <button class="play-btn running" id="btnPlay" onclick="togglePlay()">■ pause</button>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <button style="flex:1" onclick="reset()">リセット</button>
        <button style="flex:1" onclick="clearFood()">餌を消去</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">エージェント（変形菌）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">個体数</span><span class="sl-val" id="vN">8000</span></div>
        <input type="range" min="500" max="30000" value="8000" step="500" id="sN" oninput="vN.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">移動速度</span><span class="sl-val" id="vSpeed">1.0</span></div>
        <input type="range" min="0.3" max="3" value="1.0" step="0.1" id="sSpeed" oninput="vSpeed.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">センサー角度°</span><span class="sl-val" id="vSA">30</span></div>
        <input type="range" min="5" max="90" value="30" step="1" id="sSA" oninput="vSA.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">センサー距離</span><span class="sl-val" id="vSD">9</span></div>
        <input type="range" min="3" max="30" value="9" step="1" id="sSD" oninput="vSD.textContent=this.value">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">旋回角度°</span><span class="sl-val" id="vTA">35</span></div>
        <input type="range" min="5" max="90" value="35" step="1" id="sTA" oninput="vTA.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">化学物質（トレイル）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">拡散の強さ</span><span class="sl-val" id="vDiff">0.6</span></div>
        <input type="range" min="0" max="1" value="0.6" step="0.05" id="sDiff" oninput="vDiff.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">蒸発率</span><span class="sl-val" id="vDecay">0.10</span></div>
        <input type="range" min="0.01" max="0.4" value="0.10" step="0.01" id="sDecay" oninput="vDecay.textContent=(+this.value).toFixed(2)">
      </div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">沈着量</span><span class="sl-val" id="vDep">18</span></div>
        <input type="range" min="2" max="60" value="18" step="1" id="sDep" oninput="vDep.textContent=this.value">
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">餌（栄養源）</div>
      <div class="sl-row">
        <div class="sl-head"><span class="sl-name">餌の引力</span><span class="sl-val" id="vFA">3.0</span></div>
        <input type="range" min="0" max="10" value="3.0" step="0.5" id="sFA" oninput="vFA.textContent=(+this.value).toFixed(1)">
      </div>
      <div class="preset-grid">
        <button onclick="placeFood('ring')">円状に配置</button>
        <button onclick="placeFood('grid')">格子状に配置</button>
        <button onclick="placeFood('cities')">都市風に配置</button>
        <button onclick="placeFood('random')">ランダム配置</button>
      </div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-top:6px;line-height:1.7;">クリックで餌を追加<br>変形菌が餌を結ぶ最適ネットワークを形成します</div>
    </div>

    <div class="sec">
      <div class="sec-title">表示</div>
      <div class="cmap-grid">
        <button class="on" id="cm-gold" onclick="setCmap('gold')">ゴールド</button>
        <button id="cm-plasma" onclick="setCmap('plasma')">プラズマ</button>
        <button id="cm-viridis" onclick="setCmap('viridis')">ビリジス</button>
        <button id="cm-mono" onclick="setCmap('mono')">モノ</button>
      </div>
      <div class="tog-row" style="margin-top:8px;"><span class="tog-label">餌マーカーを表示</span>
        <label class="tog"><input type="checkbox" id="togFood" checked><div class="tog-track"></div></label>
      </div>
    </div>

    <div class="sec" style="font-family:var(--font-mono);font-size:9px;color:var(--text3);line-height:1.9;">
      Space: 一時停止<br>
      各エージェントは前方3方向のトレイル濃度を<br>
      感知し、濃い方へ進む。これだけで<br>
      血管・葉脈のようなネットワークが創発します
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="c"></canvas>
    <div class="hint">クリックで餌を追加 / Space: pause</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');

let W=0,H=0,GW=0,GH=0;
const SCALE=2; // sim grid is canvas/SCALE for performance
let trail, trail2; // Float32Array chemical field
let agents; // {x,y,angle}
let foods=[]; // {x,y} in grid coords
let running=true;
let fpsFrames=0,fpsLast=performance.now();
let cmap='gold';
let imgData,buf;

// ── Colormaps ──
const CMAPS={
  gold:(t)=>{ t=Math.min(1,t); return [t*255|0, (t*t*200)|0, (t*t*t*70)|0]; },
  plasma:(t)=>{const s=[[13,8,135],[126,3,168],[204,71,120],[248,148,65],[240,249,33]];return interp(s,t);},
  viridis:(t)=>{const s=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];return interp(s,t);},
  mono:(t)=>{const v=Math.min(1,t)*255|0;return [v,v,v];}
};
function interp(stops,t){
  t=Math.min(0.999,Math.max(0,t));
  const f=t*(stops.length-1), i=Math.floor(f), fr=f-i;
  const a=stops[i],b=stops[Math.min(stops.length-1,i+1)];
  return [a[0]+(b[0]-a[0])*fr|0,a[1]+(b[1]-a[1])*fr|0,a[2]+(b[2]-a[2])*fr|0];
}
function setCmap(c){cmap=c;['gold','plasma','viridis','mono'].forEach(k=>document.getElementById('cm-'+k).classList.toggle('on',k===c));}

// ── Setup ──
function reset(){
  W=canvas.width=wrap.clientWidth;
  H=canvas.height=wrap.clientHeight;
  GW=Math.floor(W/SCALE); GH=Math.floor(H/SCALE);
  trail=new Float32Array(GW*GH);
  trail2=new Float32Array(GW*GH);
  imgData=ctx.createImageData(W,H);
  buf=imgData.data;

  const n=+document.getElementById('sN').value;
  agents=new Float32Array(n*3); // x,y,angle interleaved
  // Start agents in a central disc, random angles
  const cx=GW/2, cy=GH/2, rad=Math.min(GW,GH)*0.35;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, r=Math.sqrt(Math.random())*rad;
    agents[i*3]=cx+Math.cos(a)*r;
    agents[i*3+1]=cy+Math.sin(a)*r;
    agents[i*3+2]=Math.random()*Math.PI*2;
  }
  document.getElementById('statN').textContent=n.toLocaleString();
  if(foods.length===0) placeFood('ring');
  updateFoodStat();
}

function clearFood(){foods=[];updateFoodStat();}
function updateFoodStat(){document.getElementById('statFood').textContent=foods.length;}

function placeFood(kind){
  foods=[];
  const cx=GW/2, cy=GH/2;
  if(kind==='ring'){
    const n=11, rad=Math.min(GW,GH)*0.38;
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2;foods.push({x:cx+Math.cos(a)*rad,y:cy+Math.sin(a)*rad});}
  } else if(kind==='grid'){
    const step=Math.min(GW,GH)*0.2;
    for(let gx=-2;gx<=2;gx++) for(let gy=-1;gy<=1;gy++){
      foods.push({x:cx+gx*step,y:cy+gy*step});
    }
  } else if(kind==='cities'){
    // Roughly resembling scattered population centers
    const pts=[[0.2,0.3],[0.5,0.18],[0.78,0.28],[0.3,0.55],[0.62,0.5],[0.85,0.62],[0.18,0.75],[0.45,0.82],[0.72,0.8],[0.5,0.5]];
    pts.forEach(p=>foods.push({x:p[0]*GW,y:p[1]*GH}));
  } else {
    const n=10;
    for(let i=0;i<n;i++) foods.push({x:Math.random()*GW,y:Math.random()*GH});
  }
  updateFoodStat();
}

// ── Sense ──
function senseAt(x,y,a,SD){
  const sx=x+Math.cos(a)*SD, sy=y+Math.sin(a)*SD;
  const ix=Math.floor(sx), iy=Math.floor(sy);
  if(ix<0||ix>=GW||iy<0||iy>=GH) return 0;
  let val=trail[iy*GW+ix];
  // Add food attraction: food emits virtual chemical
  const FA=+document.getElementById('sFA').value;
  if(FA>0){
    for(const f of foods){
      const dx=sx-f.x, dy=sy-f.y;
      const d2=dx*dx+dy*dy;
      val += FA*200/(d2+40);
    }
  }
  return val;
}

// ── Simulation step ──
function simStep(){
  const n=agents.length/3;
  const speed=+document.getElementById('sSpeed').value;
  const SA=+document.getElementById('sSA').value*Math.PI/180;
  const SD=+document.getElementById('sSD').value;
  const TA=+document.getElementById('sTA').value*Math.PI/180;
  const dep=+document.getElementById('sDep').value;

  for(let i=0;i<n;i++){
    let x=agents[i*3], y=agents[i*3+1], a=agents[i*3+2];
    const cF=senseAt(x,y,a,SD);
    const cL=senseAt(x,y,a-SA,SD);
    const cR=senseAt(x,y,a+SA,SD);

    if(cF>cL && cF>cR){ /* keep */ }
    else if(cF<cL && cF<cR){ a += (Math.random()<0.5?-1:1)*TA; }
    else if(cL<cR){ a += TA; }
    else if(cR<cL){ a -= TA; }

    x += Math.cos(a)*speed;
    y += Math.sin(a)*speed;

    // Wrap around
    if(x<0) x+=GW; else if(x>=GW) x-=GW;
    if(y<0) y+=GH; else if(y>=GH) y-=GH;

    // Deposit
    const ix=Math.floor(x), iy=Math.floor(y);
    if(ix>=0&&ix<GW&&iy>=0&&iy<GH) trail[iy*GW+ix]+=dep;

    agents[i*3]=x; agents[i*3+1]=y; agents[i*3+2]=a;
  }
}

// ── Diffuse + decay ──
function diffuseDecay(){
  const diff=+document.getElementById('sDiff').value;
  const decay=+document.getElementById('sDecay').value;
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      const i=y*GW+x;
      let sum=trail[i], cnt=1;
      if(x>0){sum+=trail[i-1];cnt++;}
      if(x<GW-1){sum+=trail[i+1];cnt++;}
      if(y>0){sum+=trail[i-GW];cnt++;}
      if(y<GH-1){sum+=trail[i+GW];cnt++;}
      const blurred=sum/cnt;
      const v=trail[i]*(1-diff)+blurred*diff;
      trail2[i]=v*(1-decay);
    }
  }
  const t=trail; trail=trail2; trail2=t;
}

// ── Render ──
function render(){
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      const v=trail[y*GW+x];
      const t=Math.min(1, v/40);
      const [r,g,b]=CMAPS[cmap](t);
      for(let dy=0;dy<SCALE;dy++) for(let dx=0;dx<SCALE;dx++){
        const px=((y*SCALE+dy)*W+(x*SCALE+dx))*4;
        buf[px]=r;buf[px+1]=g;buf[px+2]=b;buf[px+3]=255;
      }
    }
  }
  ctx.putImageData(imgData,0,0);

  // Food markers
  if(document.getElementById('togFood').checked){
    for(const f of foods){
      const fx=f.x*SCALE, fy=f.y*SCALE;
      ctx.strokeStyle='rgba(255,255,255,0.85)';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(fx,fy,6,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill();
    }
  }
}

// ── Loop ──
function loop(){
  requestAnimationFrame(loop);
  fpsFrames++;
  const now=performance.now();
  if(now-fpsLast>=1000){
    document.getElementById('statFps').textContent=fpsFrames;
    fpsFrames=0; fpsLast=now;
  }
  if(running){
    simStep();
    diffuseDecay();
  }
  render();
}

// ── Controls ──
function togglePlay(){
  running=!running;
  const btn=document.getElementById('btnPlay');
  btn.textContent=running?'■ pause':'▶ resume';
  btn.classList.toggle('running',running);
}
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
window.addEventListener('resize',()=>reset());

canvas.addEventListener('mousedown',e=>{
  const rect=canvas.getBoundingClientRect();
  foods.push({x:(e.clientX-rect.left)/SCALE, y:(e.clientY-rect.top)/SCALE});
  updateFoodStat();
});

// ── Boot ──
reset();
loop();
</script>
</body>
</html>
